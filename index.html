<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0A0A0A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PeakForm" />
<title>PeakForm — AI Coach</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ============================== TOKENS ============================== */
:root{
  --bg:#0A0A0A; --bg-1:#0E0E10; --bg-2:#141417;
  --glass:rgba(255,255,255,.045); --glass-2:rgba(255,255,255,.07);
  --hair:rgba(255,255,255,.08); --hair-2:rgba(255,255,255,.12);
  --text:#FAFAFA; --text-2:#9A9AA3; --text-3:#5A5A63;
  --accent:#3B82F6; --accent-2:#6366F1; --accent-soft:rgba(59,130,246,.14);
  --success:#10B981; --warn:#F59E0B; --error:#EF4444;
  --ring-track:rgba(255,255,255,.07);
  --shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 20px 40px -24px rgba(0,0,0,.8);
  --r-xl:30px; --r-lg:26px; --r-md:20px; --r-sm:14px;
  --blur:saturate(180%) blur(26px);
  --ease:cubic-bezier(.22,.61,.36,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --maxw:480px;
}
[data-theme="light"]{
  --bg:#F8F9FB; --bg-1:#FFFFFF; --bg-2:#FFFFFF;
  --glass:rgba(255,255,255,.72); --glass-2:rgba(255,255,255,.9);
  --hair:rgba(15,18,30,.08); --hair-2:rgba(15,18,30,.12);
  --text:#0C0E14; --text-2:#5B6172; --text-3:#9AA0AE;
  --accent-soft:rgba(59,130,246,.1);
  --ring-track:rgba(15,18,30,.07);
  --shadow:0 1px 2px rgba(15,18,30,.04), 0 24px 48px -28px rgba(15,18,30,.22);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Geist",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden; letter-spacing:-.01em;
  transition:background .5s var(--ease), color .5s var(--ease);
}
.mono{font-family:"Geist Mono",ui-monospace,monospace}
.eyebrow{font-family:"Geist Mono",monospace; font-size:11px; font-weight:500;
  letter-spacing:.14em; text-transform:uppercase; color:var(--text-3)}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}

/* ambient aura */
#aura{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
#aura::before,#aura::after{content:""; position:absolute; border-radius:50%;
  filter:blur(80px); opacity:.5; will-change:transform}
#aura::before{width:60vmax;height:60vmax; top:-26vmax; left:-14vmax;
  background:radial-gradient(circle,var(--accent) 0%,transparent 62%);
  animation:drift1 22s var(--ease) infinite alternate}
#aura::after{width:48vmax;height:48vmax; bottom:-22vmax; right:-16vmax;
  background:radial-gradient(circle,var(--accent-2) 0%,transparent 62%);
  animation:drift2 26s var(--ease) infinite alternate}
[data-theme="light"] #aura::before,[data-theme="light"] #aura::after{opacity:.22}
@keyframes drift1{to{transform:translate(8vmax,10vmax) scale(1.15)}}
@keyframes drift2{to{transform:translate(-7vmax,-8vmax) scale(1.1)}}

/* ============================== SHELL ============================== */
#app{position:relative; z-index:1; height:100%; max-width:var(--maxw);
  margin:0 auto; display:flex; flex-direction:column;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.18))}
[data-theme="light"] #app{background:linear-gradient(180deg,transparent,rgba(15,18,30,.02))}
.screen{flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
  padding:calc(var(--safe-top) + 22px) 20px calc(var(--safe-bot) + 118px);
  display:none; scroll-behavior:smooth}
.screen.active{display:block; animation:screenIn .55s var(--ease)}
@keyframes screenIn{from{opacity:0; transform:translateY(14px) scale(.99)}to{opacity:1; transform:none}}
.stagger>*{opacity:0; animation:up .6s var(--ease) forwards}
.stagger>*:nth-child(1){animation-delay:.02s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.14s}
.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.26s}
.stagger>*:nth-child(6){animation-delay:.32s}
.stagger>*:nth-child(7){animation-delay:.38s}
@keyframes up{to{opacity:1; transform:none}}

/* ============================== PRIMITIVES ============================== */
.card{background:var(--glass); border:1px solid var(--hair); border-radius:var(--r-lg);
  -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
  box-shadow:var(--shadow); padding:22px}
.row{display:flex; align-items:center}
.between{justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.muted{color:var(--text-2)}
.center{text-align:center}
.pill{display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px;
  background:var(--glass-2); border:1px solid var(--hair); font-size:12.5px; font-weight:500; color:var(--text-2)}
.pill.accent{background:var(--accent-soft); color:var(--accent); border-color:transparent}
.dot{width:7px;height:7px;border-radius:50%}

.section-h{display:flex; align-items:baseline; justify-content:space-between; margin:30px 4px 14px}
.section-h h2{font-size:19px; font-weight:600; letter-spacing:-.02em}
.section-h .link{font-size:13px; color:var(--accent); font-weight:500}

.btn{display:inline-flex; align-items:center; justify-content:center; gap:9px;
  height:54px; padding:0 22px; border-radius:18px; font-size:15.5px; font-weight:600;
  background:var(--text); color:var(--bg); transition:transform .25s var(--ease), opacity .25s; width:100%}
.btn:active{transform:scale(.97)}
.btn.accent{background:linear-gradient(120deg,var(--accent),var(--accent-2)); color:#fff;
  box-shadow:0 14px 34px -14px var(--accent)}
.btn.ghost{background:var(--glass); color:var(--text); border:1px solid var(--hair); backdrop-filter:var(--blur)}
.icon-btn{width:42px;height:42px;border-radius:13px; display:grid; place-items:center;
  background:var(--glass); border:1px solid var(--hair); backdrop-filter:var(--blur);
  transition:transform .2s, background .3s}
.icon-btn:active{transform:scale(.92)}

/* ============================== HOME ============================== */
.greet{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px}
.greet h1{font-size:27px; font-weight:600; letter-spacing:-.03em; line-height:1.1}
.greet .sub{color:var(--text-2); font-size:15px; margin-top:6px; max-width:78%}
.greet .sub b{color:var(--text); font-weight:600}

.hero-ring{display:flex; flex-direction:column; align-items:center; padding:8px 0 4px; margin-top:18px}
.ring-wrap{position:relative; width:248px; height:248px}
.ring-wrap svg{transform:rotate(-90deg); overflow:visible}
.ring-track{fill:none; stroke:var(--ring-track); stroke-width:14}
.ring-prog{fill:none; stroke:url(#rg); stroke-width:14; stroke-linecap:round;
  filter:drop-shadow(0 0 12px rgba(59,130,246,.45));
  transition:stroke-dashoffset 1.6s var(--ease)}
.ring-center{position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px}
.ring-center .now{font-size:58px; font-weight:300; letter-spacing:-.04em; line-height:1}
.ring-center .now span{font-size:20px; color:var(--text-2); font-weight:400; margin-left:3px}
.ring-center .lbl{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--text-3); margin-top:6px}
.ring-breathe{animation:breathe 5.5s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}
.ring-stats{display:flex; gap:0; margin-top:22px; width:100%; max-width:320px}
.ring-stat{flex:1; text-align:center}
.ring-stat+.ring-stat{border-left:1px solid var(--hair)}
.ring-stat .v{font-size:21px; font-weight:600; letter-spacing:-.02em}
.ring-stat .v small{font-size:12px; color:var(--text-2); font-weight:500}
.ring-stat .k{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--text-3); margin-top:5px}

.focus{position:relative; overflow:hidden; cursor:pointer;
  background:linear-gradient(135deg,rgba(59,130,246,.16),rgba(99,102,241,.08));
  border:1px solid rgba(99,130,246,.2)}
.focus::after{content:""; position:absolute; right:-40px; top:-40px; width:180px; height:180px;
  background:radial-gradient(circle,rgba(99,130,246,.25),transparent 70%); pointer-events:none}
.focus .ftop{display:flex; align-items:center; gap:8px; margin-bottom:14px; position:relative}
.focus h3{font-size:24px; font-weight:600; letter-spacing:-.025em; position:relative}
.focus .meta{display:flex; gap:14px; margin-top:12px; position:relative}
.focus .meta span{font-size:13px; color:var(--text-2); display:flex; align-items:center; gap:5px}

.week{display:flex; justify-content:space-between; gap:6px}
.day{flex:1; display:flex; flex-direction:column; align-items:center; gap:9px}
.day .dn{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.08em;
  color:var(--text-3); text-transform:uppercase}
.day .dd{width:34px; height:34px; border-radius:11px; display:grid; place-items:center;
  font-size:13px; font-weight:600; background:var(--glass-2); border:1px solid var(--hair); color:var(--text-2)}
.day.done .dd{background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; border-color:transparent}
.day.today .dd{border:1.5px solid var(--accent); color:var(--accent); background:var(--accent-soft)}
.day.rest .dd{color:var(--text-3)}

.coach-cta{display:flex; align-items:center; gap:14px; cursor:pointer}
.coach-av{width:46px;height:46px;border-radius:14px; flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid; place-items:center; box-shadow:0 8px 22px -8px var(--accent)}
.coach-cta .t{flex:1}
.coach-cta .t b{font-size:15px; font-weight:600}
.coach-cta .t p{font-size:13px; color:var(--text-2); margin-top:2px}

/* ============================== ACTIVITIES ============================== */
.seg{display:flex; gap:4px; padding:4px; background:var(--glass); border:1px solid var(--hair);
  border-radius:16px; backdrop-filter:var(--blur); margin-bottom:6px}
.seg button{flex:1; height:38px; border-radius:12px; font-size:13.5px; font-weight:500;
  color:var(--text-2); transition:all .3s var(--ease)}
.seg button.on{background:var(--glass-2); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.12)}

.plan-day{display:flex; align-items:center; gap:14px; padding:16px 18px; border-radius:var(--r-md);
  background:var(--glass); border:1px solid var(--hair); backdrop-filter:var(--blur);
  margin-bottom:10px; transition:transform .2s var(--ease)}
.plan-day:active{transform:scale(.985)}
.plan-day.done{opacity:.55}
.plan-day.today{border-color:rgba(99,130,246,.35); background:var(--accent-soft)}
.pd-ico{width:44px;height:44px;border-radius:13px; flex:none; display:grid; place-items:center;
  background:var(--glass-2); border:1px solid var(--hair)}
.plan-day.today .pd-ico{background:linear-gradient(135deg,var(--accent),var(--accent-2)); border-color:transparent}
.pd-t{flex:1}
.pd-t .d{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--text-3)}
.pd-t .n{font-size:15.5px; font-weight:600; margin-top:3px}
.pd-check{width:28px;height:28px;border-radius:50%; border:1.5px solid var(--hair-2);
  display:grid; place-items:center; flex:none; transition:all .3s}
.plan-day.done .pd-check{background:var(--success); border-color:transparent}

.act-card{display:flex; align-items:center; gap:14px; cursor:pointer}
.act-ico{width:50px;height:50px;border-radius:15px; flex:none; display:grid; place-items:center;
  background:var(--glass-2); border:1px solid var(--hair)}
.act-card .info{flex:1}
.act-card .info .n{font-size:16px; font-weight:600}
.act-card .info .s{font-size:13px; color:var(--text-2); margin-top:3px;
  font-family:"Geist Mono",monospace; letter-spacing:.02em}
.act-card .v{text-align:right}
.act-card .v .big{font-size:20px; font-weight:600; letter-spacing:-.02em}
.act-card .v .u{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text-3)}

.empty{text-align:center; padding:48px 24px; color:var(--text-3)}
.empty .ico{width:60px;height:60px;border-radius:20px; margin:0 auto 16px; display:grid; place-items:center;
  background:var(--glass); border:1px solid var(--hair)}
.empty p{font-size:14.5px; color:var(--text-2); margin-bottom:4px; font-weight:500}
.empty small{font-size:13px; color:var(--text-3)}

/* gym builder */
.mg-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px}
.mg{aspect-ratio:1; border-radius:var(--r-md); background:var(--glass); border:1px solid var(--hair);
  backdrop-filter:var(--blur); display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:9px; transition:all .25s var(--ease)}
.mg.on{background:var(--accent-soft); border-color:var(--accent)}
.mg span{font-size:13px; font-weight:500; color:var(--text-2)}
.mg.on span{color:var(--accent)}

/* ============================== COACH ============================== */
#screen-coach{padding:0; display:none; flex-direction:column}
#screen-coach.active{display:flex}
.coach-head{padding:calc(var(--safe-top) + 18px) 20px 16px; display:flex; align-items:center; gap:13px;
  border-bottom:1px solid var(--hair); background:var(--glass);
  backdrop-filter:var(--blur); position:sticky; top:0; z-index:3}
.coach-head .av{width:42px;height:42px;border-radius:13px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:grid; place-items:center;
  box-shadow:0 8px 20px -8px var(--accent)}
.coach-head .t b{font-size:16px; font-weight:600; display:block}
.coach-head .t span{font-size:12px; color:var(--success); display:flex; align-items:center; gap:5px; margin-top:1px}
.chat{flex:1; overflow-y:auto; padding:20px 18px 12px; display:flex; flex-direction:column; gap:14px}
.msg{max-width:84%; padding:13px 16px; font-size:14.5px; line-height:1.5; border-radius:20px; white-space:pre-wrap; word-wrap:break-word}
.msg.coach{align-self:flex-start; background:var(--glass); border:1px solid var(--hair);
  backdrop-filter:var(--blur); border-bottom-left-radius:7px}
.msg.user{align-self:flex-end; background:linear-gradient(120deg,var(--accent),var(--accent-2));
  color:#fff; border-bottom-right-radius:7px}
.msg.coach b{font-weight:600}
.typing{align-self:flex-start; display:flex; gap:5px; padding:16px 18px; background:var(--glass);
  border:1px solid var(--hair); border-radius:20px; border-bottom-left-radius:7px; backdrop-filter:var(--blur)}
.typing i{width:7px;height:7px;border-radius:50%; background:var(--text-3); animation:tb 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{opacity:.3; transform:translateY(0)}30%{opacity:1; transform:translateY(-4px)}}
.chips{display:flex; gap:8px; padding:6px 18px 12px; overflow-x:auto; flex-wrap:nowrap}
.chip{flex:none; padding:9px 15px; border-radius:999px; background:var(--glass); border:1px solid var(--hair);
  font-size:13px; font-weight:500; color:var(--text-2); backdrop-filter:var(--blur); white-space:nowrap;
  transition:all .2s}
.chip:active{transform:scale(.94); background:var(--accent-soft); color:var(--accent)}
.composer{display:flex; gap:10px; padding:12px 16px 14px;
  margin-bottom:calc(var(--safe-bot) + 90px);
  border-top:1px solid var(--hair); background:var(--glass); backdrop-filter:var(--blur)}
.composer input{flex:1; height:50px; border-radius:16px; padding:0 18px; font-size:15px;
  background:var(--glass-2); border:1px solid var(--hair); color:var(--text); outline:none}
.composer input::placeholder{color:var(--text-3)}
.composer .send{width:50px;height:50px;border-radius:16px; flex:none; display:grid; place-items:center;
  background:linear-gradient(120deg,var(--accent),var(--accent-2)); color:#fff;
  transition:transform .2s, opacity .2s}
.composer .send:active{transform:scale(.9)}
.composer .send:disabled{opacity:.4}

/* recovery */
.rec-q{margin-bottom:18px}
.rec-q .ql{font-size:14.5px; font-weight:500; margin-bottom:11px}
.rec-opts{display:flex; gap:8px}
.rec-opts button{flex:1; height:46px; border-radius:14px; font-size:13px; font-weight:500;
  background:var(--glass); border:1px solid var(--hair); color:var(--text-2); backdrop-filter:var(--blur);
  transition:all .25s var(--ease)}
.rec-opts button.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent)}

/* ============================== PROFILE ============================== */
.prof-head{display:flex; flex-direction:column; align-items:center; padding:8px 0 4px}
.prof-av{width:84px;height:84px;border-radius:28px; display:grid; place-items:center; font-size:32px; font-weight:600;
  background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff;
  box-shadow:0 16px 40px -14px var(--accent); margin-bottom:14px}
.prof-head h2{font-size:23px; font-weight:600; letter-spacing:-.02em}
.prof-head .meta{font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.06em;
  color:var(--text-3); margin-top:6px; text-transform:uppercase}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.stat{padding:18px}
.stat .k{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3)}
.stat .v{font-size:26px; font-weight:600; letter-spacing:-.03em; margin-top:9px}
.stat .v small{font-size:14px; color:var(--text-2); font-weight:500}

.ach-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.ach{padding:18px 16px; display:flex; flex-direction:column; gap:11px; position:relative; overflow:hidden}
.ach.locked{opacity:.42}
.ach .ai{width:46px;height:46px;border-radius:14px; display:grid; place-items:center;
  background:linear-gradient(135deg,var(--warn),#FB923C); box-shadow:0 8px 20px -8px var(--warn)}
.ach.locked .ai{background:var(--glass-2); box-shadow:none}
.ach .at{font-size:14.5px; font-weight:600; letter-spacing:-.01em}
.ach .ad{font-size:12px; color:var(--text-2); margin-top:-6px}

.setting{display:flex; align-items:center; justify-content:space-between; padding:16px 18px;
  border-bottom:1px solid var(--hair)}
.setting:last-child{border-bottom:none}
.setting .sl{display:flex; align-items:center; gap:13px}
.setting .sl b{font-size:14.5px; font-weight:500}
.toggle{width:48px;height:28px;border-radius:999px; background:var(--glass-2); border:1px solid var(--hair);
  position:relative; transition:background .3s}
.toggle.on{background:var(--accent)}
.toggle i{position:absolute; top:2px; left:2px; width:22px;height:22px;border-radius:50%;
  background:#fff; transition:transform .3s var(--ease)}
.toggle.on i{transform:translateX(20px)}

/* ============================== NAV ============================== */
#nav{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(var(--safe-bot) + 18px);
  z-index:20; display:flex; gap:4px; padding:7px; border-radius:999px;
  background:var(--glass); border:1px solid var(--hair-2); backdrop-filter:var(--blur);
  box-shadow:0 24px 50px -18px rgba(0,0,0,.7); width:min(calc(100% - 40px),var(--maxw))}
[data-theme="light"] #nav{box-shadow:0 24px 50px -22px rgba(15,18,30,.3)}
#nav button{flex:1; height:52px; border-radius:999px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px; color:var(--text-3); transition:all .3s var(--ease)}
#nav button .nl{font-size:10px; font-weight:500; letter-spacing:.01em}
#nav button.on{color:var(--text)}
#nav button.on .navico{background:var(--accent-soft)}
.navico{width:30px;height:30px;border-radius:10px; display:grid; place-items:center; transition:background .3s}
#nav button.on svg{stroke:var(--accent)}

/* ============================== SHEET / MODAL ============================== */
#sheet-bg{position:fixed; inset:0; z-index:40; background:rgba(0,0,0,.55);
  backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:opacity .35s var(--ease)}
#sheet-bg.show{opacity:1; pointer-events:auto}
#sheet{position:fixed; left:50%; transform:translateX(-50%) translateY(100%);
  bottom:0; z-index:41; width:100%; max-width:var(--maxw);
  background:var(--bg-1); border:1px solid var(--hair); border-bottom:none;
  border-radius:30px 30px 0 0; padding:10px 22px calc(var(--safe-bot) + 26px);
  max-height:90vh; overflow-y:auto; transition:transform .42s var(--ease);
  box-shadow:0 -20px 60px -20px rgba(0,0,0,.7)}
#sheet.show{transform:translateX(-50%) translateY(0)}
.grab{width:38px;height:4px;border-radius:99px; background:var(--hair-2); margin:6px auto 18px}
.sheet-h{font-size:21px; font-weight:600; letter-spacing:-.02em; margin-bottom:4px}
.sheet-sub{font-size:14px; color:var(--text-2); margin-bottom:22px}
.field{margin-bottom:16px}
.field label{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--text-3); display:block; margin-bottom:8px}
.field input,.field select{width:100%; height:52px; border-radius:15px; padding:0 16px; font-size:16px;
  background:var(--glass); border:1px solid var(--hair); color:var(--text); outline:none; backdrop-filter:var(--blur)}
.field input:focus,.field select:focus{border-color:var(--accent)}
.exrow{display:flex; gap:8px; align-items:center; margin-bottom:8px}
.exrow input{flex:1}

/* splash */
#splash{position:fixed; inset:0; z-index:100; background:var(--bg); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:20px; transition:opacity .6s var(--ease)}
#splash.hide{opacity:0; pointer-events:none}
#splash .logo{width:74px;height:74px;border-radius:24px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:grid; place-items:center;
  box-shadow:0 20px 50px -12px var(--accent); animation:breathe 3s ease-in-out infinite}
#splash .wm{font-size:22px; font-weight:600; letter-spacing:-.02em}
#splash .wm span{color:var(--accent)}

/* ============================== GUIDED WORKOUT PLAYER ============================== */
#player{position:fixed; inset:0; z-index:80; background:var(--bg); display:none;
  flex-direction:column; max-width:var(--maxw); margin:0 auto}
#player.show{display:flex; animation:plIn .5s var(--ease)}
@keyframes plIn{from{opacity:0; transform:scale(1.03)}to{opacity:1; transform:none}}
.pl-top{padding:calc(var(--safe-top) + 16px) 18px 12px; display:flex; align-items:center; gap:14px}
.pl-bar{flex:1; height:5px; border-radius:99px; background:var(--glass-2); overflow:hidden}
.pl-bar i{display:block; height:100%; border-radius:99px; width:0;
  background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .6s var(--ease)}
.pl-step{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.1em; color:var(--text-3); white-space:nowrap}

/* demo stage */
.stage{position:relative; margin:6px 18px 0; height:40vh; min-height:260px; border-radius:var(--r-xl);
  overflow:hidden; background:
    radial-gradient(120% 90% at 50% 0%,rgba(59,130,246,.18),transparent 60%),
    linear-gradient(160deg,var(--bg-2),var(--bg-1)); border:1px solid var(--hair)}
.stage::after{content:""; position:absolute; left:0; right:0; bottom:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--hair-2),transparent)}
.figwrap{position:absolute; inset:0; display:grid; place-items:center}
.fig{width:78%; height:78%; overflow:visible; filter:drop-shadow(0 8px 26px rgba(59,130,246,.32))}
.fig line{stroke:#fff; stroke-width:9; stroke-linecap:round; fill:none}
.fig circle{fill:#fff; stroke:none}
[data-theme="light"] .fig line{stroke:var(--accent)} [data-theme="light"] .fig circle{fill:var(--accent)}
.poseA{opacity:1; animation:figA var(--td,2.6s) ease-in-out infinite}
.poseB{opacity:0; animation:figB var(--td,2.6s) ease-in-out infinite}
@keyframes figA{0%,10%{opacity:1}48%,56%{opacity:0}94%,100%{opacity:1}}
@keyframes figB{0%,10%{opacity:0}48%,56%{opacity:1}94%,100%{opacity:0}}
.demo-vid{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
.tempo{position:absolute; left:18px; right:18px; bottom:16px; height:5px; border-radius:99px;
  background:var(--glass-2)}
.tempo .tdot{position:absolute; top:-3px; width:11px; height:11px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 12px var(--accent);
  animation:tmp var(--td,2.6s) ease-in-out infinite}
@keyframes tmp{0%,100%{left:0}50%{left:calc(100% - 11px)}}
.stage .muscle{position:absolute; top:14px; left:16px}

/* body */
.pl-body{flex:1; padding:22px 22px calc(var(--safe-bot) + 22px); display:flex; flex-direction:column;
  overflow-y:auto}
.pl-name{font-size:27px; font-weight:600; letter-spacing:-.03em; margin-bottom:8px}
.pl-cue{font-size:15px; color:var(--text-2); line-height:1.5; margin-bottom:20px}
.pl-metrics{display:flex; gap:12px; margin-bottom:18px}
.pl-metric{flex:1; padding:16px; border-radius:var(--r-md); background:var(--glass);
  border:1px solid var(--hair); backdrop-filter:var(--blur); text-align:center}
.pl-metric .k{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--text-3)}
.pl-metric .v{font-size:30px; font-weight:600; letter-spacing:-.03em; margin-top:6px; line-height:1}
.pl-metric .v small{font-size:14px; color:var(--text-2); font-weight:500}
.setdots{display:flex; gap:7px; justify-content:center; margin-bottom:6px}
.setdots i{width:9px; height:9px; border-radius:50%; background:var(--glass-2); border:1px solid var(--hair)}
.setdots i.done{background:var(--success); border-color:transparent}
.setdots i.now{background:var(--accent); border-color:transparent; box-shadow:0 0 0 4px var(--accent-soft)}
.motivate{text-align:center; font-size:14.5px; font-weight:500; color:var(--accent); min-height:20px;
  margin:14px 0 6px; animation:up .5s var(--ease)}
.pl-actions{margin-top:auto; display:flex; flex-direction:column; gap:10px}

/* rest ring */
.rest-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  padding:30px 22px calc(var(--safe-bot) + 22px)}
.rest-ring{position:relative; width:230px; height:230px}
.rest-ring svg{transform:rotate(-90deg)}
.rest-ring .rt{fill:none; stroke:var(--ring-track); stroke-width:12}
.rest-ring .rp{fill:none; stroke:url(#rg2); stroke-width:12; stroke-linecap:round;
  filter:drop-shadow(0 0 10px rgba(59,130,246,.5)); transition:stroke-dashoffset 1s linear}
.rest-ring .rc{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
.rest-ring .rc .num{font-size:62px; font-weight:300; letter-spacing:-.04em; line-height:1}
.rest-ring .rc .lab{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--text-3); margin-top:8px}
.nextup{display:flex; align-items:center; gap:13px; padding:14px 18px; border-radius:var(--r-md);
  background:var(--glass); border:1px solid var(--hair); backdrop-filter:var(--blur); width:100%; margin-top:8px}
.nextup .nx-ico{width:40px;height:40px;border-radius:12px; display:grid; place-items:center;
  background:var(--glass-2); border:1px solid var(--hair); color:var(--accent)}
.nextup .t .k{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3)}
.nextup .t .n{font-size:15px; font-weight:600; margin-top:2px}
.rest-btns{display:flex; gap:10px; width:100%; margin-top:14px}
.rest-btns .btn{height:50px}

/* get-ready countdown */
.ready{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px}
.ready .big{font-size:120px; font-weight:200; letter-spacing:-.05em;
  background:linear-gradient(120deg,var(--accent),var(--accent-2)); -webkit-background-clip:text;
  background-clip:text; -webkit-text-fill-color:transparent; animation:pop .9s var(--ease)}
@keyframes pop{from{transform:scale(.4); opacity:0}to{transform:scale(1); opacity:1}}
.ready .lab{font-family:"Geist Mono",monospace; letter-spacing:.16em; text-transform:uppercase; color:var(--text-3)}

/* overview */
.ov-head{padding:0 4px}
.ov-list{display:flex; flex-direction:column; gap:10px; margin:18px 0}
.ov-ex{display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:var(--r-md);
  background:var(--glass); border:1px solid var(--hair); backdrop-filter:var(--blur)}
.ov-ex .n{font-size:11px; font-family:"Geist Mono",monospace; color:var(--text-3); width:22px}
.ov-ex .mini{width:42px;height:42px;border-radius:12px; background:var(--glass-2); border:1px solid var(--hair);
  display:grid; place-items:center; color:var(--accent); flex:none}
.ov-ex .info{flex:1}
.ov-ex .info b{font-size:15px; font-weight:600}
.ov-ex .info span{font-size:12.5px; color:var(--text-2); font-family:"Geist Mono",monospace}

/* completion */
.done-screen{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:30px 24px calc(var(--safe-bot) + 24px); gap:8px}
.done-screen .badge{width:96px;height:96px;border-radius:32px; display:grid; place-items:center; margin-bottom:8px;
  background:linear-gradient(135deg,var(--success),#34D399); box-shadow:0 20px 50px -14px var(--success);
  animation:pop .6s var(--ease)}
.done-screen h2{font-size:28px; font-weight:600; letter-spacing:-.03em}
.done-screen p{font-size:15px; color:var(--text-2); max-width:300px; line-height:1.5}
.done-stats{display:flex; gap:0; margin:22px 0 8px; width:100%; max-width:340px}
.done-stats .ds{flex:1; text-align:center}
.done-stats .ds+.ds{border-left:1px solid var(--hair)}
.done-stats .v{font-size:24px; font-weight:600; letter-spacing:-.02em}
.done-stats .k{font-family:"Geist Mono",monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); margin-top:5px}
.coach-note{display:flex; gap:12px; align-items:flex-start; text-align:left; padding:16px;
  border-radius:var(--r-md); background:var(--glass); border:1px solid var(--hair); margin-top:14px; width:100%}
.coach-note .av{width:36px;height:36px;border-radius:11px; flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:grid; place-items:center}
.coach-note p{font-size:13.5px; color:var(--text-2); line-height:1.5; margin:0}

/* session card on home */
.session-card{position:relative; overflow:hidden}
.session-card .stack{display:flex; gap:6px; margin:14px 0 18px; flex-wrap:wrap}
.session-card .ex-chip{font-size:12px; font-weight:500; padding:6px 11px; border-radius:99px;
  background:var(--glass-2); border:1px solid var(--hair); color:var(--text-2)}

/* generating overlay */
#gen{position:fixed; inset:0; z-index:90; background:rgba(8,8,10,.86); backdrop-filter:blur(10px);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:20px}
[data-theme="light"] #gen{background:rgba(248,249,251,.9)}
#gen.show{display:flex; animation:up .4s var(--ease)}
#gen .orb{width:64px;height:64px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--accent),var(--accent-2),var(--accent));
  animation:spin 1s linear infinite; -webkit-mask:radial-gradient(circle 22px at center,transparent 98%,#000);
  mask:radial-gradient(circle 22px at center,transparent 98%,#000)}
@keyframes spin{to{transform:rotate(360deg)}}
#gen .gt{font-size:15px; font-weight:500; color:var(--text)}
#gen .gs{font-size:13px; color:var(--text-3)}

/* ============================== TROPHY ROOM ============================== */
#trophy,#share{position:fixed; inset:0; z-index:82; background:var(--bg); display:none;
  flex-direction:column; max-width:var(--maxw); margin:0 auto}
#trophy.show,#share.show{display:flex; animation:plIn .45s var(--ease)}
.tr-head{padding:calc(var(--safe-top) + 18px) 20px 14px; display:flex; align-items:center; gap:14px}
.tr-head .ttl{flex:1}
.tr-head .ttl h2{font-size:23px; font-weight:600; letter-spacing:-.02em}
.tr-head .ttl .sub{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text-3); margin-top:4px}
.tr-collected{display:flex; align-items:baseline; gap:6px}
.tr-collected b{font-size:18px; font-weight:600}
.tr-body{flex:1; overflow-y:auto; padding:4px 20px calc(var(--safe-bot) + 24px)}
.tr-filters{display:flex; gap:8px; overflow-x:auto; padding:6px 0 16px; margin:0 -2px}
.tr-filters .chip{flex:none}
.tr-filters .chip.on{background:var(--accent-soft); color:var(--accent); border-color:transparent}
.medal-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
.medal-tile{position:relative; padding:18px 14px 16px; border-radius:var(--r-lg); text-align:center;
  background:var(--glass); border:1px solid var(--hair); backdrop-filter:var(--blur);
  transition:transform .25s var(--ease)}
.medal-tile:active{transform:scale(.96)}
.medal-tile.earned{border-color:var(--rc,var(--hair)); box-shadow:0 0 0 1px var(--rc,transparent) inset, 0 16px 40px -22px var(--rc,#000)}
.medal-tile .art{width:96px; height:110px; margin:0 auto 10px; filter:drop-shadow(0 10px 16px rgba(0,0,0,.4))}
.medal-tile.locked .art{filter:grayscale(.4) brightness(.7)}
.medal-tile .mt-title{font-size:14px; font-weight:600; letter-spacing:-.01em; line-height:1.2}
.medal-tile .mt-rar{font-family:"Geist Mono",monospace; font-size:9.5px; letter-spacing:.14em;
  text-transform:uppercase; margin-top:5px; color:var(--rc,var(--text-3))}
.medal-tile.locked .mt-rar{color:var(--text-3)}
.mt-prog{height:5px; border-radius:99px; background:var(--glass-2); margin-top:10px; overflow:hidden}
.mt-prog i{display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.mt-prog-lbl{font-family:"Geist Mono",monospace; font-size:9px; letter-spacing:.08em; color:var(--text-3); margin-top:6px}
.mt-new{position:absolute; top:10px; right:10px; font-family:"Geist Mono",monospace; font-size:8.5px;
  letter-spacing:.1em; background:var(--accent); color:#fff; padding:3px 7px; border-radius:99px; font-weight:600}

/* medal detail sheet */
.md-detail{text-align:center}
.md-detail .big-art{width:200px; height:230px; margin:6px auto 4px; position:relative;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.5))}
.md-detail .big-art::after{content:""; position:absolute; inset:0;
  background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.5) 48%,transparent 60%);
  background-size:300% 300%; animation:shine 3.5s var(--ease) infinite; mix-blend-mode:overlay; pointer-events:none}
@keyframes shine{0%{background-position:140% 140%}55%,100%{background-position:-40% -40%}}
.md-detail .rar-badge{display:inline-flex; align-items:center; gap:7px; padding:7px 14px; border-radius:999px;
  font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:600;
  margin:6px 0 14px}
.md-detail h2{font-size:24px; font-weight:600; letter-spacing:-.02em}
.md-detail .md-desc{font-size:14.5px; color:var(--text-2); line-height:1.5; margin:10px 0 4px; max-width:300px; margin-inline:auto}
.md-detail .md-meta{font-family:"Geist Mono",monospace; font-size:11px; letter-spacing:.08em; color:var(--text-3); margin-top:8px}

/* ============================== UNLOCK REVEAL ============================== */
#unlock{position:fixed; inset:0; z-index:95; display:none; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:30px 28px calc(var(--safe-bot) + 28px); overflow:hidden;
  background:radial-gradient(120% 80% at 50% 30%,rgba(59,130,246,.16),rgba(5,5,7,.96))}
#unlock.show{display:flex; animation:up .4s var(--ease)}
#unlock .burst{position:absolute; top:32%; left:50%; width:340px; height:340px; transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--uc,#3B82F6) 0%,transparent 62%); opacity:.5; filter:blur(20px);
  animation:burst 1s var(--ease)}
@keyframes burst{0%{transform:translate(-50%,-50%) scale(.2); opacity:0}40%{opacity:.6}100%{transform:translate(-50%,-50%) scale(1); opacity:.4}}
#unlock .kick{font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.22em; text-transform:uppercase;
  color:var(--uc,#3B82F6); margin-bottom:18px; animation:up .6s var(--ease) .2s both}
#unlock .u-art{width:210px; height:240px; position:relative; animation:medalIn 1s var(--ease) both;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,.6))}
@keyframes medalIn{0%{transform:scale(.3) rotate(-25deg); opacity:0}60%{transform:scale(1.08) rotate(4deg)}100%{transform:scale(1) rotate(0); opacity:1}}
#unlock .u-art::after{content:""; position:absolute; inset:0;
  background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.65) 50%,transparent 62%);
  background-size:300% 300%; animation:shine 2.6s var(--ease) .8s infinite; pointer-events:none}
#unlock h2{font-size:27px; font-weight:600; letter-spacing:-.02em; margin-top:14px; animation:up .6s var(--ease) .5s both}
#unlock .u-rar{font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--uc,#3B82F6); font-weight:600; margin-top:8px; animation:up .6s var(--ease) .6s both}
#unlock .u-desc{font-size:14.5px; color:var(--text-2); margin-top:12px; max-width:300px; line-height:1.5; animation:up .6s var(--ease) .7s both}
#unlock .u-actions{display:flex; flex-direction:column; gap:10px; width:100%; max-width:340px; margin-top:30px; animation:up .6s var(--ease) .85s both}
.confetti{position:absolute; inset:0; pointer-events:none; overflow:hidden}
.confetti i{position:absolute; top:-20px; width:9px; height:13px; border-radius:2px; opacity:.9;
  animation:confetti linear forwards}
@keyframes confetti{to{transform:translateY(110vh) rotate(720deg); opacity:0}}

/* ============================== SHARE STUDIO ============================== */
.share-frame{flex:1; display:flex; align-items:center; justify-content:center; padding:8px 20px;
  overflow:hidden; min-height:0}
#share{z-index:97}
.share-frame .card-wrap{position:relative; box-shadow:0 30px 70px -24px rgba(0,0,0,.7); border-radius:18px;
  overflow:hidden; max-height:100%; max-width:100%}
.share-frame .card-wrap svg{display:block; max-height:56vh; max-width:100%; height:auto; width:auto}
.share-frame .card-wrap.landscape svg{max-height:none; max-width:88vw}
.share-tabs{display:flex; gap:6px; padding:14px 20px 8px; justify-content:center}
.share-tabs button{display:flex; flex-direction:column; align-items:center; gap:7px; padding:10px 16px; border-radius:14px;
  background:var(--glass); border:1px solid var(--hair); backdrop-filter:var(--blur); color:var(--text-2);
  font-size:11px; font-weight:500; transition:all .25s var(--ease); min-width:74px}
.share-tabs button.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent)}
.share-tabs .ratio{border:1.6px solid currentColor; border-radius:4px; opacity:.8}
.share-tabs .r916{width:13px; height:23px}
.share-tabs .r11{width:20px; height:20px}
.share-tabs .r169{width:26px; height:15px}
.share-actions{display:flex; gap:10px; padding:10px 20px calc(var(--safe-bot) + 18px)}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important; transition-duration:.01ms!important}
  .poseB{opacity:0}.poseA{opacity:1}
}
@media (min-width:481px){
  body{background:radial-gradient(circle at 50% 0%,var(--bg-2),var(--bg))}
}

const $=(s,r=document)=>r.querySelector(s);

const haptic=()=>{try{navigator.vibrate&&navigator.vibrate(8)}catch(e){}};
function progressPct(){const u=state.user;return Math.max(0,Math.min(1,(u.start-u.current)/(u.start-u.target)));}
function toGo(){return Math.max(0,(state.user.current-state.user.target)).toFixed(1);}
function lost(){return Math.max(0,(state.user.start-state.user.current)).toFixed(1);}
function etaDate(){
  const log=state.weightLog; if(log.length<2)return '—';
  const rate=(log[0].w-log[log.length-1].w)/(log.length-1); // kg per entry (~5-6 days)
  if(rate<=0)return 'Keep going';
  const remaining=state.user.current-state.user.target;
  const entries=remaining/rate; const days=entries*5.5;
  const d=new Date(); d.setDate(d.getDate()+Math.round(days));
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function greeting(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';}

  if(tab==='profile')renderProfile();
  if(tab==='coach'){renderCoach();setTimeout(()=>{const c=$('#chat');c.scrollTop=c.scrollHeight;},60);}
  const sc=$('#screen-'+tab); if(sc) sc.scrollTop=0;
}

function renderActBody(){

function addSet(){
  setCount++; const c=$('#ex-sets');

/* ============================== LOGGER SHEET ============================== */
function openLogger(){
  openSheet(`
    <div class="sheet-h">Log activity</div>
    <div class="sheet-sub">What did you do?</div>
    <div class="field"><label>Type</label>
      <select id="lg-type" onchange="loggerFields()">
        <option>Run</option><option>Cycling</option><option>Walking</option><option>Hike</option>
      </select></div>
    <div id="lg-fields"></div>
    <button class="btn accent" onclick="saveLog()">Save activity</button>`);
  loggerFields();
}
function loggerFields(){
  const t=$('#lg-type').value, f=$('#lg-fields');
  const km=`<div class="field"><label>Distance (km)</label><input id="f-dist" inputmode="decimal" placeholder="5.0"></div>`;
  const dur=`<div class="field"><label>Duration (min)</label><input id="f-dur" inputmode="numeric" placeholder="32"></div>`;
  if(t==='Walking') f.innerHTML=`<div class="field"><label>Steps</label><input id="f-steps" inputmode="numeric" placeholder="8000"></div>`+km+dur;
  else f.innerHTML=km+dur;
}
function saveLog(){
  haptic();
  const t=$('#lg-type').value;
  const dist=parseFloat($('#f-dist')?.value)||0;
  const dur=parseFloat($('#f-dur')?.value)||0;
  const steps=$('#f-steps')?.value;
  const w=state.user.current;
  let big,unit,sub,kind=t;
  if(t==='Walking'){
    big=steps?Number(steps).toLocaleString():dist.toFixed(1); unit=steps?'steps':'km';
    sub=`${dist?dist.toFixed(1)+' km · ':''}${dur} min active`; kind='Walking';
  } else {
    const pace=dist?Math.floor(dur/dist)+':'+String(Math.round((dur/dist%1)*60)).padStart(2,'0'):'—';
    const perKm={Run:1.05,Cycling:.42,Hike:.9}[t]||1;
    const kcal=Math.round(dist*w*perKm);
    big=dist.toFixed(1); unit='km';
    sub=`${dur}:00 · ${pace} /km · ${kcal} kcal`;
    if(t==='Cycling'){const spd=dur?(dist/(dur/60)).toFixed(1):'—'; sub=`${dur}:00 · ${spd} km/h · ${kcal} kcal`;}
  }
  state.activities.unshift({kind, label:t+' session', when:'Today', big, unit, sub});
  closeSheet(); toast(t+' logged'); if(current==='activities'){actTab='log';renderActivities();}
}

function fmt(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/^•/gm,'· ').replace(/^- /gm,'· ');
}
function coachContext(){
  const u=state.user, r=state.recovery;
  const done=state.plan.filter(p=>p.done).map(p=>p.name).join(', ')||'none yet';
  const todayP=state.plan.find(p=>p.today);
  const recent=state.activities.slice(0,3).map(a=>`${a.label} (${a.big}${a.unit})`).join('; ');
  return `You are "Coach", a calm, premium personal fitness coach inside the PeakForm app. You speak directly to ${u.name}.
Profile: ${u.heightCm}cm, ${u.current}kg now, started ${u.start}kg, target ${u.target}kg (${(u.current-u.target).toFixed(1)}kg to go). Activities: running, cycling, walking, gym, hiking.

Recovery check-in: sleep ${r.sleep||'unknown'}, energy ${r.energy||'unknown'}, soreness ${r.soreness||'unknown'}.
Risk rules: keep advice safe and progressive; deload if soreness is high or sleep poor.

}
let busy=false;
async function sendCoach(preset){
  if(busy)return;
  const input=$('#coach-input');
  const text=(preset!==undefined?preset:input.value).trim();
  if(!text)return;
  if(current!=='coach')go('coach');
  input.value=''; haptic();
  state.coachMessages.push({role:'user',text});
  paintChat();
  busy=true; $('#coach-send').disabled=true;
  const c=$('#chat');
  const typing=el('<div class="typing"><i></i><i></i><i></i></div>'); c.appendChild(typing); c.scrollTop=c.scrollHeight;

  // build conversation history for the API (must start with a user turn)
  let history=state.coachMessages.filter(m=>m.text).map(m=>({
    role:m.role==='user'?'user':'assistant', content:m.text
  }));
  while(history.length && history[0].role!=='user') history.shift();

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:1000,
        system:coachContext(),
        messages:history
      })
    });
    const data=await res.json();
    const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()
      || "I'm here — tell me how you're feeling and I'll guide today's session.";
    typing.remove();
    state.coachMessages.push({role:'coach',text:reply});
    paintChat();
  }catch(e){
    typing.remove();
    state.coachMessages.push({role:'coach',text:"I couldn't reach the coaching engine just now. Based on your plan, today's a Lower Body day — if you're not too sore, aim for squats, lunges and core. Check in again in a moment."});
    paintChat();
  }
  busy=false; $('#coach-send').disabled=false;
  store.save();
}

async function generateSession(){
  const u=state.user,r=state.recovery;
  const done=state.plan.filter(p=>p.done).map(p=>p.name).join(', ')||'none yet';
  const todayP=state.plan.find(p=>p.today);
  const ids=Object.keys(EX).join(', ');
  const od=state.onboarding||{};
  const profileCtx=od.goal?`Goal: ${od.goal}. Level: ${od.level||'intermediate'}. Activities: ${(od.activities||[]).join(', ')}. Equipment: ${(od.equipment||[]).join(', ')}.`:'';
  const prompt=`Design today's guided workout for ${u.name}. Adapt intensity to recovery.
Context — now ${u.current}kg, target ${u.target}kg; goals: weight loss, cardio endurance, strength, consistency.
${profileCtx}
This week completed: ${done}. Today on plan: ${todayP?todayP.name:'flexible'}.
Recovery: sleep ${r.sleep||'unknown'}, energy ${r.energy||'unknown'}, soreness ${r.soreness||'unknown'}.
If soreness is high or sleep poor, reduce volume and pick lower-impact work; if energy is high, push harder.
Use ONLY these exercise ids: ${ids}.
Return ONLY valid JSON, no markdown, shape:
{"title":string,"focus":string,"coachNote":string (1-2 sentences, warm, references their recovery),"blocks":[{"ex":id,"sets":int,"reps":int}|{"ex":id,"sets":int,"seconds":int} plus "rest":int seconds]}
6-7 blocks. Reps 8-15, seconds 20-45, rest 30-75.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    let txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    txt=txt.replace(/```json|```/g,'').trim();
    const s=JSON.parse(txt);
    s.blocks=s.blocks.filter(b=>EX[b.ex]).map(b=>({ex:b.ex,sets:Math.max(1,b.sets||3),
      reps:b.reps,seconds:b.seconds,rest:b.rest||60}));
    if(!s.blocks.length) throw new Error('empty');
    return s;
  }catch(e){ return FALLBACK_SESSION; }
}

const P={};            // running session state
let wTimer=null;
function clearW(){if(wTimer){clearInterval(wTimer);wTimer=null;}}

async function openWorkout(){

  let i=0; const gi=setInterval(()=>{i=(i+1)%subs.length;const el=$('#gen-sub');if(el)el.textContent=subs[i];},900);
  const session=await generateSession();
  clearInterval(gi); $('#gen').classList.remove('show');
  P.session=session; P.bi=0; P.si=0;

}
function closePlayer(){clearW(); $('#player').classList.remove('show'); $('#player').innerHTML='';}

function getReady(){

  paint();

function progressPctW(){
  const s=P.session; const totalSets=s.blocks.reduce((a,b)=>a+b.sets,0);
  let doneSets=0; for(let i=0;i<P.bi;i++)doneSets+=s.blocks[i].sets; doneSets+=P.si;
  return Math.round(doneSets/totalSets*100);
}
function activePhase(){
  clearW();
  const s=P.session, b=s.blocks[P.bi], e=EX[b.ex];
  const isTime=!!b.seconds;
  const dots=Array.from({length:b.sets},(_,i)=>`<i class="${i<P.si?'done':i===P.si?'now':''}"></i>`).join('');
  $('#player').innerHTML=`
    ${plHeader(`EXERCISE ${P.bi+1} / ${s.blocks.length}`,progressPctW())}
    <div class="stage">
      <span class="pill accent muscle">${e.muscle}</span>
      ${figureSVG(b.ex)}
    </div>
    <div class="pl-body">
      <div class="pl-name">${e.name}</div>
      <div class="pl-cue">${e.cue}</div>
      <div class="pl-metrics">
        <div class="pl-metric"><div class="k">${isTime?'Hold':'Target'}</div>
          <div class="v" id="bigval">${isTime?b.seconds:b.reps}<small>${isTime?'s':' reps'}</small></div></div>
        <div class="pl-metric"><div class="k">Set</div><div class="v">${P.si+1}<small> / ${b.sets}</small></div></div>
      </div>
      <div class="setdots">${dots}</div>
      <div class="motivate" id="motiv">${P.bi===0&&P.si===0?"Let's begin — first set.":cheer()}</div>
      <div class="pl-actions">
        ${isTime
          ? `<button class="btn accent" id="timed-btn" disabled>Hold…</button>`
          : `<button class="btn accent" onclick="completeSet()">Set done</button>
             <button class="btn ghost" onclick="completeSet()">Skip set</button>`}
      </div>
    </div>`;
  if(isTime){
    let t=b.seconds; const bv=$('#bigval'), btn=$('#timed-btn');
    const tick=()=>{t--; if(bv)bv.innerHTML=`${Math.max(t,0)}<small>s</small>`;
      if(t<=0){clearW(); haptic(); completeSet();}};
    wTimer=setInterval(tick,1000);
    setTimeout(()=>{if(btn){btn.disabled=false;btn.textContent='Finish early';btn.onclick=()=>{clearW();completeSet();};}},1200);
  }
}

function completeSet(){
  clearW(); haptic();
  const s=P.session, b=s.blocks[P.bi];
  P.si++;
  if(P.si>=b.sets){            // exercise finished
    P.bi++; P.si=0;
    if(P.bi>=s.blocks.length){ finishSession(); return; }
    startRest(b.rest, true);   // rest, then next exercise
  } else {
    startRest(b.rest, false);  // rest, then next set of same exercise
  }
}

function startRest(sec, nextExercise){
  clearW();
  const s=P.session, b=s.blocks[P.bi], e=EX[b.ex];
  const C=2*Math.PI*104;
  const nextLabel = nextExercise ? 'Next exercise' : 'Next set';
  $('#player').innerHTML=`
    ${plHeader('REST',progressPctW())}
    <svg width="0" height="0"><defs><linearGradient id="rg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#6366F1"/></linearGradient></defs></svg>
    <div class="rest-wrap">
      <div class="rest-ring">
        <svg width="230" height="230" viewBox="0 0 230 230">
          <circle class="rt" cx="115" cy="115" r="104"/>
          <circle class="rp" id="restP" cx="115" cy="115" r="104" stroke-dasharray="${C}" stroke-dashoffset="0"/>
        </svg>
        <div class="rc"><div class="num" id="restNum">${sec}</div><div class="lab">Rest</div></div>
      </div>
      <div class="motivate">${restline()}</div>
      <div class="nextup">
        <div class="nx-ico">${exIcon(b.ex)}</div>
        <div class="t"><div class="k">${nextLabel}</div>
          <div class="n">${e.name} · ${b.seconds?b.seconds+'s':'set '+(P.si+1)+' of '+b.sets}</div></div>
      </div>
      <div class="rest-btns">
        <button class="btn ghost" onclick="addRest(15)">+15s</button>
        <button class="btn accent" onclick="skipRest()">Skip rest</button>
      </div>
    </div>`;
  P.restLeft=sec; P.restTotal=sec;
  const ring=$('#restP');
  const tick=()=>{
    P.restLeft--;
    const num=$('#restNum'); if(num)num.textContent=Math.max(P.restLeft,0);
    if(ring)ring.style.strokeDashoffset = C*(1-P.restLeft/P.restTotal);
    if(P.restLeft<=0){clearW(); haptic(); activePhase();}
  };
  clearW(); wTimer=setInterval(tick,1000);
}
function addRest(n){P.restLeft+=n; P.restTotal+=n; const num=$('#restNum'); if(num)num.textContent=P.restLeft;}
function skipRest(){clearW(); haptic(); activePhase();}

function finishSession(){

function fmtProg(m){
  if(!m.prog)return 'Locked';

function setFmt(f){shareState.fmt=f; haptic(); renderShare();}
function renderShare(){
  const d=shareState.data, fmt=shareState.fmt;
  const ratioIcon={story:'<span class="ratio r916"></span>',square:'<span class="ratio r11"></span>',landscape:'<span class="ratio r169"></span>'};

    </div>

      <button class="${fmt==='story'?'on':''}" onclick="setFmt('story')">${ratioIcon.story}Story</button>
      <button class="${fmt==='square'?'on':''}" onclick="setFmt('square')">${ratioIcon.square}Square</button>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save image</button>
      <button class="btn accent" onclick="shareCardNative()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0-12l-4 4m4-4l4 4M5 13v6a2 2 0 002 2h10a2 2 0 002-2v-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Share</button>
    </div>`;
}
const SC_DIM={story:[1080,1920],square:[1080,1080],landscape:[1920,1080]};
function shareCardSVG(d,fmt){
  const [W,H]=SC_DIM[fmt]; const cx=W/2, u=Math.min(W,H); const A=d.accent||'#3B82F6';
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const T=(x,y,s,size,w,col,anc='middle',sp=0)=>`<text x="${x}" y="${y}" font-family="Geist, system-ui, -apple-system, Segoe UI, Arial, sans-serif" font-size="${size}" font-weight="${w}" fill="${col}" text-anchor="${anc}" letter-spacing="${sp}">${esc(s)}</text>`;
  const M=(x,y,s,size,col,anc='middle',sp=0)=>`<text x="${x}" y="${y}" font-family="Geist Mono, ui-monospace, monospace" font-size="${size}" font-weight="500" fill="${col}" text-anchor="${anc}" letter-spacing="${sp}">${esc(s)}</text>`;
  const land=fmt==='landscape';
  const fit=(s,maxW,base)=>Math.min(base, maxW/(0.56*Math.max(1,String(s).length)));
  const yBrand=H*(land?0.13:0.095), yKick=H*(land?0.24:0.16);
  const hasMedal=!!d.medal;
  const yHero=H*(land?0.5:(hasMedal?0.30:0.40));
  const yTitle=hasMedal?H*(land?0.72:0.6):yHero;
  const yStats=H*(land?0.82:0.83), yFoot=H*(land?0.93:0.94);
  const stats=(d.stats||[]).slice(0,4);
  const panelW=W*(land?0.78:0.84), panelX=cx-panelW/2, panelH=u*(land?0.17:0.13), panelY=yStats-panelH*0.62;
  const colW=panelW/stats.length;
  const svFont=stats.length>=4?u*0.046:u*0.056;
  const statsSvg=stats.map((st,i)=>{
    const x=panelX+colW*(i+0.5);
    const sep=i>0?`<line x1="${panelX+colW*i}" y1="${panelY+panelH*0.22}" x2="${panelX+colW*i}" y2="${panelY+panelH*0.78}" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>`:'';
    return sep+T(x,panelY+panelH*0.52,st.v,fit(st.v,colW*0.92,svFont),600,'#fff')+M(x,panelY+panelH*0.8,String(st.k).toUpperCase(),u*0.021,'rgba(255,255,255,.5)','middle',u*0.004);
  }).join('');
  let medalSvg='';
  if(hasMedal){ const mw=u*(land?0.38:0.46), k=mw/200, mx=cx-mw/2, my=yHero-mw*0.2;
    medalSvg=`<g transform="translate(${mx},${my}) scale(${k})">${medalInner(d.medal.cat,d.medal.rarity,false)}</g>`; }
  let heroTxt=hasMedal?'':T(cx,yHero+u*0.02,d.title,fit(d.title,W*0.84,u*0.082),600,'#fff');
  const titleTxt=hasMedal?T(cx,yTitle,d.title,fit(d.title,W*0.8,u*0.07),600,'#fff'):'';
  const badge=d.badge?`<rect x="${cx-u*0.17}" y="${yTitle+u*0.028}" width="${u*0.34}" height="${u*0.058}" rx="${u*0.029}" fill="${A}22" stroke="${A}" stroke-width="1.5"/>${M(cx,yTitle+u*0.067,d.badge.toUpperCase(),u*0.023,A,'middle',u*0.004)}`:'';
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="scbg" x1="0" y1="0" x2="0.4" y2="1">
        <stop offset="0" stop-color="${shade(A,-58)}"/><stop offset="0.5" stop-color="#0A0A0E"/><stop offset="1" stop-color="#060507"/></linearGradient>
      <radialGradient id="scglow" cx="50%" cy="${land?'45%':'33%'}" r="60%">
        <stop offset="0" stop-color="${A}" stop-opacity="0.32"/><stop offset="100%" stop-color="${A}" stop-opacity="0"/></radialGradient>
    </defs>
    <rect width="${W}" height="${H}" fill="url(#scbg)"/>
    <g>${[0.55,0.75,0.95,1.15].map(r=>`<circle cx="${cx}" cy="${H*(land?0.42:0.3)}" r="${u*r}" fill="none" stroke="rgba(255,255,255,.045)" stroke-width="1.5"/>`).join('')}</g>
    <rect width="${W}" height="${H}" fill="url(#scglow)"/>
    ${M(cx-u*0.07,yBrand,'PEAK',u*0.034,'#fff','middle',u*0.01)}${M(cx+u*0.075,yBrand,'FORM',u*0.034,A,'middle',u*0.01)}<circle cx="${cx+u*0.168}" cy="${yBrand-u*0.012}" r="${u*0.011}" fill="${A}"/>
    <rect x="${cx-u*0.21}" y="${yKick-u*0.042}" width="${u*0.42}" height="${u*0.064}" rx="${u*0.032}" fill="rgba(255,255,255,.06)" stroke="${A}" stroke-width="1.5"/>${M(cx,yKick,d.kicker.toUpperCase(),u*0.026,A,'middle',u*0.006)}
    ${medalSvg}${heroTxt}${titleTxt}${badge}
    <rect x="${panelX}" y="${panelY}" width="${panelW}" height="${panelH}" rx="${u*0.04}" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.1)" stroke-width="1.5"/>
    ${statsSvg}
    ${M(cx,yFoot,(state.user.name+' · '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})).toUpperCase(),u*0.021,'rgba(255,255,255,.45)','middle',u*0.004)}
  </svg>`;
}
async function rasterize(d,fmt){
  const [W,H]=SC_DIM[fmt];
  try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const svg=shareCardSVG(d,fmt);
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml;charset=utf-8'}));
    const img=new Image();
    img.onload=()=>{ const c=document.createElement('canvas'); c.width=W; c.height=H;
      c.getContext('2d').drawImage(img,0,0,W,H); URL.revokeObjectURL(url);
      c.toBlob(b=>res(b),'image/png'); };
    img.onerror=rej; img.src=url;
  });
}
async function downloadCard(){
  try{ const b=await rasterize(shareState.data,shareState.fmt);
    const a=document.createElement('a'); a.href=URL.createObjectURL(b);
    a.download=`peakform-${shareState.data.type}-${shareState.fmt}.png`; a.click(); toast('Card saved');
  }catch(e){ toast('Could not render card'); }
}
async function shareCardNative(){
  try{ const b=await rasterize(shareState.data,shareState.fmt);
    const file=new File([b],`peakform-${shareState.data.type}.png`,{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'PeakForm',text:shareState.data.title});
    } else { const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=file.name; a.click(); toast('Saved — share from your gallery'); }
  }catch(e){ /* user cancelled */ }
}

<style>
/* ============================== ONBOARDING — iPhone-ready ============================== */

/*
  Layout model:
  #onboarding = fixed full-screen shell (100dvh keeps it inside the viewport on iOS)
  .ob-slides   = flex-1, overflow hidden — clipping layer for slide transitions
  .ob-slide    = absolute fill, scrollable internally with -webkit-overflow-scrolling
  .ob-footer   = fixed-height dock anchored to bottom safe area, outside scroll
  Back/Skip buttons float above all content using position:absolute inside #onboarding
*/

/* ---------- shell ---------- */
#onboarding {
  position: fixed;
  inset: 0;
  /* 100dvh respects the browser chrome on iOS Safari correctly */
  height: 100dvh;
  z-index: 200;
  background: var(--bg);
  display: none;          /* shown by .ob-visible */
  flex-direction: column;
  max-width: var(--maxw);
  margin: 0 auto;
  overflow: hidden;
  /* prevent rubber-band bleed from inner scroll leaking to the page */
  overscroll-behavior: contain;
}
#onboarding.ob-visible { display: flex; }

/* ---------- progress stripe ---------- */
.ob-progress-wrap {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 10;
  height: 3px;
  background: rgba(255,255,255,.07);
  /* flush with notch — no top padding needed because the bar is 3 px */
}
.ob-progress-bar {
  height: 100%;
  border-radius: 0 2px 2px 0;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  transition: width .5s cubic-bezier(.22,.61,.36,1);
  box-shadow: 0 0 10px var(--accent);
  width: 0%;
}

/* ---------- back / skip chrome ---------- */
/* Sit at safe-top + small gap, inside the fixed shell */
.ob-back {
  position: absolute;
  top: calc(var(--safe-top) + 16px);
  left: 18px;
  z-index: 11;
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--glass-2);
  border: 1px solid var(--hair);
  -webkit-backdrop-filter: var(--blur);
  backdrop-filter: var(--blur);
  display: none;            /* toggled inline */
  place-items: center;
  transition: transform .18s, opacity .25s;
  color: var(--text-2);
}
.ob-back:active { transform: scale(.90); }

.ob-skip {
  position: absolute;
  top: calc(var(--safe-top) + 22px);
  right: 20px;
  z-index: 11;
  font-size: 14px; font-weight: 500;
  color: var(--text-3);
  padding: 6px 2px;
  display: none;            /* toggled inline */
}

/* ---------- slides layer ---------- */
.ob-slides {
  /* sits between progress-bar (top) and footer (bottom) */
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;            /* crucial: lets flex child shrink below content size */
}

.ob-slide {
  position: absolute;
  inset: 0;
  /* top padding: safe-top + button chrome height (≈56 px) */
  padding-top: calc(var(--safe-top) + 74px);
  padding-left: 22px;
  padding-right: 22px;

  display: flex;

  transform: translateX(32px);
  transition: opacity .38s cubic-bezier(.22,.61,.36,1),
              transform .38s cubic-bezier(.22,.61,.36,1);
  /* independent scroll so each slide can scroll without affecting siblings */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
.ob-slide.ob-active {
  opacity: 1;
  pointer-events: auto;
  transform: none;
}
.ob-slide.ob-exit {
  opacity: 0;
  pointer-events: none;
  transform: translateX(-32px);
}

/* ---------- slide header type ---------- */
.ob-eyebrow {
  font-family: "Geist Mono", monospace;
  font-size: 11px; font-weight: 500;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--accent);

}
.ob-eyebrow::before {

  display: inline-block;

.ob-field input:focus, .ob-field select:focus {

  box-shadow: 0 0 0 3px rgba(59,130,246,.14);
}
.ob-field input::placeholder { color: var(--text-3); }
.ob-row { display: flex; gap: 10px; }
.ob-row .ob-field { flex: 1; min-width: 0; }

/* ---------- unit toggles ---------- */
.ob-unit-group {
  display: flex; gap: 6px;
  margin-bottom: 14px;
  flex-shrink: 0;
}
.ob-unit-group button {
  flex: 1; height: 36px; border-radius: 10px;
  border: 1px solid var(--hair);
  background: var(--glass);
  font-size: 13px; font-weight: 500;
  color: var(--text-2);
  transition: all .18s;
}
.ob-unit-group button.on {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ---------- activity chips ---------- */
.ob-chips {
  display: flex; flex-wrap: wrap; gap: 9px;
  margin-bottom: 20px;
}
.ob-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 14px;
  background: var(--glass-2); border: 1px solid var(--hair);
  font-size: 13.5px; font-weight: 500; color: var(--text-2);
  transition: all .18s var(--ease);
  user-select: none;
  -webkit-user-select: none;
}
.ob-chip:active { transform: scale(.94); }
.ob-chip.on {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}
.ob-chip .ob-chip-ico {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--glass);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.ob-chip.on .ob-chip-ico { background: rgba(59,130,246,.2); }

/* ---------- goal cards ---------- */
.ob-goal-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.ob-goal-card {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px; border-radius: 18px;
  background: var(--glass); border: 1.5px solid var(--hair);
  transition: all .22s var(--ease);
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
  position: relative; overflow: hidden;
}
.ob-goal-card:active { transform: scale(.978); }
.ob-goal-card.on {
  background: linear-gradient(135deg,rgba(59,130,246,.12),rgba(99,102,241,.07));
  border-color: rgba(59,130,246,.45);
}
.ob-goal-card.on::after {
  content: ""; position: absolute; right: -20px; top: -20px;
  width: 90px; height: 90px;
  background: radial-gradient(circle,rgba(59,130,246,.2),transparent 70%);
  pointer-events: none;
}
.ob-goal-icon {
  width: 44px; height: 44px; border-radius: 13px;
  background: var(--glass-2); display: grid; place-items: center;
  flex-shrink: 0; font-size: 20px;
  transition: background .22s;
}
.ob-goal-card.on .ob-goal-icon { background: var(--accent-soft); }
.ob-goal-info { flex: 1; min-width: 0; }
.ob-goal-info b { font-size: 15px; font-weight: 600; display: block; }
.ob-goal-info span { font-size: 12.5px; color: var(--text-2); margin-top: 2px; display: block; }
.ob-goal-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--hair-2); flex-shrink: 0;
  display: grid; place-items: center;
  transition: all .18s; background: transparent;
}
.ob-goal-card.on .ob-goal-check { background: var(--accent); border-color: var(--accent); }

/* ---------- level tiles ---------- */
.ob-levels {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 9px; margin-bottom: 20px;
}
.ob-level {
  /* fixed height so tiles don't grow awkwardly on wide iPhones */
  min-height: 110px;
  border-radius: 16px;
  background: var(--glass-2); border: 1.5px solid var(--hair);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; padding: 10px;
  transition: all .22s var(--ease);
}
.ob-level:active { transform: scale(.95); }
.ob-level.on { background: var(--accent-soft); border-color: var(--accent); }
.ob-level-icon { font-size: 26px; line-height: 1; }
.ob-level-name { font-size: 12.5px; font-weight: 600; color: var(--text); }
.ob-level-desc { font-size: 10.5px; color: var(--text-3); text-align: center; line-height: 1.3; }

/* ---------- frequency ---------- */
.ob-freq-grid { display: flex; gap: 7px; margin-bottom: 20px; }
.ob-freq-btn {
  flex: 1; min-width: 0;
  height: 58px; border-radius: 14px;
  background: var(--glass-2); border: 1.5px solid var(--hair);

  align-items: center; justify-content: center;
  gap: 1px;
}
.ob-freq-btn small {
  font-size: 9px; font-weight: 500; color: var(--text-3);
  letter-spacing: .05em; font-family: "Geist Mono", monospace;

}
.ob-freq-btn.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.ob-freq-btn.on small { color: var(--accent); opacity: .7; }

/* ---------- equipment ---------- */
.ob-equip-grid {
  display: grid; grid-template-columns: 1fr 1fr;

}
.ob-equip {
  padding: 14px; border-radius: 14px;

}
.ob-equip:active { transform: scale(.95); }
.ob-equip.on { background: var(--accent-soft); border-color: var(--accent); }
.ob-equip-icon { font-size: 20px; flex-shrink: 0; }
.ob-equip-name { font-size: 13px; font-weight: 500; color: var(--text-2); }
.ob-equip.on .ob-equip-name { color: var(--accent); }

/* ---------- integrations ---------- */
.ob-integrations { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.ob-integration {
  display: flex; align-items: center; gap: 13px;
  padding: 14px 16px; border-radius: 16px;

  width: 42px; height: 42px; border-radius: 11px;
  display: grid; place-items: center; flex-shrink: 0;
  font-size: 20px;
}
.ob-integration-info { flex: 1; min-width: 0; }
.ob-integration-info b { font-size: 14.5px; font-weight: 600; display: block; }

.ob-integration-toggle {
  width: 42px; height: 24px; border-radius: 99px;
  background: var(--hair-2); position: relative;
  transition: background .28s; flex-shrink: 0;
}
.ob-integration-toggle::after {
  content: ""; position: absolute;
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px;

  box-shadow: 0 2px 5px rgba(0,0,0,.3);

.ob-integration.on .ob-integration-toggle::after { transform: translateX(18px); }

  position: absolute; top: 9px; right: 12px;
  font-size: 9px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; font-family: "Geist Mono", monospace;
  color: var(--text-3); background: var(--glass-2);
  padding: 3px 6px; border-radius: 99px; border: 1px solid var(--hair);
}

/* ---------- intro slide ---------- */
.ob-intro {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  /* pull up slightly so logo feels centered optically */
  padding: 0 6px 20px;
}
.ob-intro-logo {
  width: 84px; height: 84px; border-radius: 26px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));

}
@keyframes obLogoIn {

}
.ob-intro-title {
  font-size: 32px; font-weight: 700;

}
@keyframes obTitleIn {
  from { transform: translateY(18px); opacity: 0; }

}
.ob-intro-subtitle {

}
.ob-intro-features {
  display: flex; gap: 10px; margin-top: 32px;

}
.ob-intro-feat {
  display: flex; align-items: center; gap: 6px;
  font-size: 12.5px; color: var(--text-2); font-weight: 500;
  background: var(--glass-2); border: 1px solid var(--hair);
  padding: 7px 12px; border-radius: 99px;
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);

/* ---------- generating overlay ---------- */

}
.ob-gen-orb {

  background: radial-gradient(circle, rgba(59,130,246,.2) 0%, rgba(99,102,241,.08) 50%, transparent 70%);
  animation: obGenPulse 3s ease-in-out infinite;
}
@keyframes obGenPulse {

}
.ob-gen-ring {

  animation: obGenRing 3s ease-in-out infinite;
}
.ob-gen-ring-1 { width: min(280px,70vw); height: min(280px,70vw); margin: calc(min(280px,70vw)/-2) 0 0 calc(min(280px,70vw)/-2); animation-delay: 0s; }
.ob-gen-ring-2 { width: min(380px,90vw); height: min(380px,90vw); margin: calc(min(380px,90vw)/-2) 0 0 calc(min(380px,90vw)/-2); animation-delay: .4s; }
@keyframes obGenRing {
  0%   { transform: scale(.88); opacity: 0; }
  50%  { opacity: 1; }
  100% { transform: scale(1.12); opacity: 0; }
}
.ob-gen-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  padding: calc(var(--safe-top) + 12px) 28px calc(var(--safe-bot) + 12px);
  width: 100%;
}
.ob-gen-icon {
  width: 68px; height: 68px; border-radius: 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: grid; place-items: center; margin-bottom: 24px;
  box-shadow: 0 14px 36px -14px var(--accent);
  animation: obLogoIn .6s var(--ease) both;
}
.ob-gen-title {
  font-size: 26px; font-weight: 600; letter-spacing: -.03em;
  margin-bottom: 6px;
  animation: obTitleIn .6s var(--ease) .1s both;
}
.ob-gen-sub {
  font-size: 14.5px; color: var(--text-2); margin-bottom: 28px;
  animation: obTitleIn .6s var(--ease) .2s both;
  min-height: 22px; transition: opacity .35s;
}
.ob-gen-steps {
  display: flex; flex-direction: column; gap: 9px;
  width: 100%; max-width: 290px;
  animation: obTitleIn .6s var(--ease) .3s both;
}
.ob-gen-step {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 15px; border-radius: 13px;
  background: var(--glass-2); border: 1px solid var(--hair);
  font-size: 13.5px; font-weight: 500; color: var(--text-3);
  transition: all .45s var(--ease);
  opacity: 0; transform: translateY(7px);
}
.ob-gen-step.ob-step-active { opacity: 1; transform: none; color: var(--text-2); }
.ob-gen-step.ob-step-done   { color: var(--success); border-color: rgba(16,185,129,.22); background: rgba(16,185,129,.06); opacity: 1; transform: none; }
.ob-gen-step-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--text-3); transition: background .35s;
}
.ob-gen-step.ob-step-active .ob-gen-step-dot { background: var(--accent); animation: obDotPulse 1.3s ease-in-out infinite; }
.ob-gen-step.ob-step-done   .ob-gen-step-dot { background: var(--success); animation: none; }
@keyframes obDotPulse { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ---------- welcome screen ---------- */
#ob-welcome-screen {
  position: fixed;
  inset: 0;
  height: 100dvh;
  z-index: 210;
  background: var(--bg);
  display: none;
  flex-direction: column; align-items: center; justify-content: flex-end;
  max-width: var(--maxw); margin: 0 auto;

}
.ob-welcome-aura {

}
.ob-welcome-content {
  position: relative; z-index: 2;

}
.ob-welcome-icon {
  width: 74px; height: 74px; border-radius: 23px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));

}
.ob-welcome-kicker {

}
.ob-welcome-name {
  font-size: 34px; font-weight: 700; letter-spacing: -.05em; line-height: 1;
  margin-bottom: 8px;
}
.ob-welcome-tagline {
  font-size: 15px; color: var(--text-2); line-height: 1.5; margin-bottom: 22px;
  max-width: 300px;
}
.ob-plan-preview {
  width: 100%; background: var(--glass-2); border: 1px solid var(--hair);
  border-radius: 18px; padding: 16px; margin-bottom: 22px;
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
}
.ob-plan-preview-title {
  font-size: 10.5px; font-family: "Geist Mono", monospace; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; text-align: left;
}
.ob-plan-days { display: flex; gap: 5px; justify-content: space-between; }
.ob-plan-day-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.ob-plan-day-label {
  font-size: 8.5px; font-family: "Geist Mono", monospace; letter-spacing: .08em;
  text-transform: uppercase; color: var(--text-3);
}
.ob-plan-day-dot {
  width: 30px; height: 30px; border-radius: 9px;
  display: grid; place-items: center; font-size: 13px;
}
.ob-plan-day-dot.ob-workout { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
.ob-plan-day-dot.ob-rest    { background: var(--glass-2); border: 1px solid var(--hair); }
.ob-welcome-cta {
  width: 100%;
  animation: obTitleIn .8s var(--ease) .5s both;
}

/* ---------- footer CTA dock ---------- */
.ob-footer {
  /* fixed height, never squeezed by keyboard because keyboard shrinks the viewport */
  padding: 14px 22px calc(var(--safe-bot) + 18px);
  background: linear-gradient(0deg, var(--bg) 72%, transparent);
  flex-shrink: 0;
}
.ob-btn-primary {
  width: 100%; height: 54px; border-radius: 17px;
  background: linear-gradient(120deg, var(--accent), var(--accent-2));

  border: none;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  box-shadow: 0 12px 32px -12px var(--accent);

}
.ob-btn-primary:active { transform: scale(.96); opacity: .88; }
.ob-btn-primary:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

/* ---------- measurement hint card ---------- */
.ob-measure-visual {
  display: flex; align-items: center; gap: 14px;

}
.ob-measure-icon { font-size: 28px; }
.ob-measure-info { flex: 1; min-width: 0; }
.ob-measure-info b { font-size: 13.5px; font-weight: 600; display: block; margin-bottom: 1px; }

@media (max-height: 668px) {

  .ob-goal-icon   { width: 38px; height: 38px; font-size: 18px; }

/* ---------- Keyboard-aware: when virtual keyboard is up,
   iOS shrinks the visual viewport, .ob-slide scrolls naturally.
   Nothing else needs to change because footer is flex-shrink:0
   and the slide itself is overflow-y:auto.
   Explicitly prevent the footer from sliding under the keyboard: ---------- */
@supports (height: 100dvh) {
  #onboarding, #ob-generating, #ob-welcome-screen {
    height: 100dvh;
  }
}

/* ---------- misc ---------- */
.ob-dob-row { display: flex; gap: 10px; }
.ob-dob-row .ob-field { flex: 1; }

/* Remove the broken position:fixed pseudo-element — the slide's own
   overflow-y:auto already clips; the gradient is purely decorative and
   was causing paint issues inside fixed stacking contexts on iOS. */
.ob-slide::after { display: none; }

<script>
/* ============================================================
   ONBOARDING ENGINE
   ============================================================ */

// ---- Persistence ----
function saveOnboardingData(data) {
  try { localStorage.setItem('pf_onboarding', JSON.stringify(data)); } catch(e){}
}
function loadOnboardingData() {
  try { return JSON.parse(localStorage.getItem('pf_onboarding') || 'null'); } catch(e){ return null; }
}
function clearOnboarding() {
  try { localStorage.removeItem('pf_onboarding'); } catch(e){}
}

// ---- Apply onboarding data to app state ----
function applyOnboardingToState(od) {
  if(!od) return;
  state.user.name = od.firstName || state.user.name;
  if(od.weightKg) { state.user.current = parseFloat(od.weightKg); state.user.start = parseFloat(od.weightKg); }
  if(od.targetWeightKg) state.user.target = parseFloat(od.targetWeightKg);
  if(od.heightCm) state.user.heightCm = parseFloat(od.heightCm);
  // Store full onboarding profile on state for Coach context
  state.onboarding = od;
}

// ---- Onboarding state ----
let ob = {
  step: 0,
  data: {},
  weightUnit: 'kg',
  heightUnit: 'cm',
};

// ---- Step definitions ----
const OB_STEPS = [
  { id:'intro',       skip:false, back:false },
  { id:'personal',    skip:false, back:true  },
  { id:'measurements',skip:false, back:true  },
  { id:'goal',        skip:false, back:true  },
  { id:'activities',  skip:false, back:true  },
  { id:'level',       skip:false, back:true  },
  { id:'equipment',   skip:true,  back:true  },
  { id:'frequency',   skip:false, back:true  },
  { id:'integrations',skip:true,  back:true  },
];

function startOnboarding() {
  ob.step = 0;
  ob.data = {};
  const obEl = $('#onboarding');
  obEl.classList.add('ob-visible');
  buildSlides();
  showStep(0, 'enter');
}

function buildSlides() {
  const container = $('#ob-slides');
  container.innerHTML = '';
  OB_STEPS.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'ob-slide';
    div.id = 'ob-slide-' + i;
    div.innerHTML = renderSlideContent(s.id, i);
    container.appendChild(div);
  });
  // Re-attach slider listeners
  attachSliderListeners();
}

function renderSlideContent(id, idx) {
  switch(id) {
    case 'intro': return renderIntroSlide();
    case 'personal': return renderPersonalSlide();
    case 'measurements': return renderMeasurementsSlide();
    case 'goal': return renderGoalSlide();
    case 'activities': return renderActivitiesSlide();
    case 'level': return renderLevelSlide();
    case 'equipment': return renderEquipmentSlide();
    case 'frequency': return renderFrequencySlide();
    case 'integrations': return renderIntegrationsSlide();
    default: return '';
  }
}
