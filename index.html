<!--
  HYBRID COACH AI — single-file PWA
  Design system: "Hybrid" — dual-domain identity (Strength = ember, Endurance = teal)
  on a near-black glass surface. Signature: the Hybrid Ring + WHOOP-style recovery gauge.
  Coach Felix is wired to the live Anthropic API (claude-sonnet-4-6).
  Self-contained, no external deps, DirectAdmin-deployable.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#07080A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hybrid Coach">
<title>Hybrid Coach AI</title>
<style>
:root{
  --bg:#07080A; --bg-2:#0B0D11;
  --glass:rgba(255,255,255,.045);
  --glass-2:rgba(255,255,255,.07);
  --hair:rgba(255,255,255,.09);
  --hair-2:rgba(255,255,255,.14);
  --txt:#F4F6FA; --muted:#8B919C; --muted-2:#5C616B;
  --ember:#FF5A36; --ember-2:#FF8A5B;
  --teal:#27E0A8; --teal-2:#5AF0C4;
  --blue:#4D8DFF; --gold:#F5C451; --violet:#9D7BFF;
  --red:#FF4D5E; --amber:#FFC24B; --green:#27E0A8;
  --r:22px; --r-sm:14px;
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  --shadow:0 18px 50px -20px rgba(0,0,0,.8);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,sans-serif;
  font-feature-settings:"tnum" 1,"cv01" 1; letter-spacing:-.01em;
  -webkit-font-smoothing:antialiased; overflow:hidden; overscroll-behavior:none;
}
#app{position:relative;max-width:480px;height:100dvh;margin:0 auto;background:
  radial-gradient(120% 70% at 80% -10%,rgba(255,90,54,.10),transparent 55%),
  radial-gradient(120% 60% at 0% 5%,rgba(39,224,168,.10),transparent 55%),
  var(--bg);
  overflow:hidden;box-shadow:0 0 0 1px var(--hair);
}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:calc(var(--safe-top) + 14px) 18px calc(108px + var(--safe-bot));
  opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .28s var(--ease),transform .28s var(--ease)}
.screen.active{opacity:1;transform:none;pointer-events:auto}
.screen::-webkit-scrollbar{display:none}
/* typography */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
h1{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.05}
h2{font-size:20px;font-weight:780;letter-spacing:-.02em}
.h-sub{color:var(--muted);font-size:14px;font-weight:500}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
/* glass card */
.card{background:var(--glass);border:1px solid var(--hair);border-radius:var(--r);
  backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);
  position:relative;overflow:hidden}
.card.pad{padding:16px}
.card::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(160deg,rgba(255,255,255,.06),transparent 40%)}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between}
.spacer{flex:1}
.mt{margin-top:18px}.mt-s{margin-top:10px}.mb{margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:650;
  padding:6px 11px;border-radius:999px;background:var(--glass-2);border:1px solid var(--hair);color:var(--muted)}
.chip.on{color:#07080A;background:var(--teal);border-color:transparent}
.pill{font-size:10.5px;font-weight:750;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:999px}
.pill.ember{color:var(--ember-2);background:rgba(255,90,54,.13)}
.pill.teal{color:var(--teal);background:rgba(39,224,168,.13)}
.pill.blue{color:var(--blue);background:rgba(77,141,255,.14)}
.pill.gold{color:var(--gold);background:rgba(245,196,81,.14)}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:15px;
  padding:14px 18px;border-radius:16px;transition:transform .12s var(--ease),filter .2s}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(120deg,var(--ember),var(--ember-2));color:#1a0a05}
.btn.teal{background:linear-gradient(120deg,var(--teal),var(--teal-2));color:#022;}
.btn.ghost{background:var(--glass-2);border:1px solid var(--hair);color:var(--txt)}
.btn.full{width:100%}
.fade-up{animation:fadeUp .5s var(--ease) backwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
/* header */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.avatar{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:800;
  background:linear-gradient(135deg,var(--ember),var(--teal));color:#07080A;font-size:17px;box-shadow:var(--shadow)}
.iconbtn{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:var(--glass);border:1px solid var(--hair)}
/* bottom nav */
.nav{position:absolute;left:0;right:0;bottom:0;z-index:40;padding:8px 14px calc(10px + var(--safe-bot));
  background:linear-gradient(to top,var(--bg) 30%,rgba(7,8,10,.4) 80%,transparent)}
.nav-inner{display:flex;justify-content:space-around;background:rgba(16,18,22,.72);
  backdrop-filter:blur(26px) saturate(160%);-webkit-backdrop-filter:blur(26px) saturate(160%);
  border:1px solid var(--hair);border-radius:24px;padding:8px 6px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0;color:var(--muted-2);font-size:10px;font-weight:650;transition:color .2s}
.nav-item svg{width:23px;height:23px}
.nav-item.active{color:var(--txt)}
.nav-item.active .nav-dot{opacity:1;transform:scale(1)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--ember);opacity:0;transform:scale(0);transition:.25s var(--ease);margin-top:1px}
/* rings & gauges */
.ring-wrap{position:relative;display:grid;place-items:center}
.ring-center{position:absolute;text-align:center}
.bar{height:7px;border-radius:99px;background:var(--glass-2);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:99px}
/* sheet / modal */
.sheet-bg{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-bg.open{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:61;max-height:92%;overflow-y:auto;
  background:var(--bg-2);border:1px solid var(--hair);border-bottom:none;border-radius:28px 28px 0 0;
  transform:translateY(102%);transition:transform .38s var(--ease);padding:10px 18px calc(26px + var(--safe-bot))}
.sheet.open{transform:none}
.sheet::-webkit-scrollbar{display:none}
.grab{width:38px;height:5px;border-radius:99px;background:var(--hair-2);margin:6px auto 16px}
/* exercise video tile */
.vtile{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:16/10;border:1px solid var(--hair);
  background:linear-gradient(135deg,#14171d,#0c0e12);display:grid;place-items:center}
.vtile .play{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;box-shadow:var(--shadow)}
.vtile .play svg{width:24px;height:24px;fill:#07080A;margin-left:3px}
.vtile .vmesh{position:absolute;inset:0;opacity:.5;background:
  radial-gradient(60% 80% at 20% 20%,rgba(255,90,54,.25),transparent),
  radial-gradient(60% 80% at 90% 90%,rgba(39,224,168,.22),transparent)}
.exrow{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:18px;background:var(--glass);border:1px solid var(--hair);margin-bottom:10px;transition:transform .12s}
.exrow:active{transform:scale(.985)}
.exnum{width:34px;height:34px;border-radius:11px;flex:none;display:grid;place-items:center;font-weight:800;font-size:14px;background:var(--glass-2);border:1px solid var(--hair)}
/* coach chat */
#coachScroll{position:absolute;inset:0;bottom:0;overflow-y:auto;padding:calc(var(--safe-top) + 86px) 16px 160px}
#coachScroll::-webkit-scrollbar{display:none}
.msg{max-width:84%;padding:12px 15px;border-radius:20px;font-size:14.5px;line-height:1.5;margin-bottom:12px;white-space:pre-wrap;word-wrap:break-word;animation:fadeUp .35s var(--ease)}
.msg.coach{background:var(--glass);border:1px solid var(--hair);border-bottom-left-radius:7px;align-self:flex-start}
.msg.me{background:linear-gradient(120deg,var(--ember),var(--ember-2));color:#1a0a05;border-bottom-right-radius:7px;align-self:flex-end;font-weight:560}
.coach-head{position:absolute;top:0;left:0;right:0;z-index:5;padding:calc(var(--safe-top) + 12px) 18px 14px;
  background:linear-gradient(to bottom,var(--bg) 55%,transparent);display:flex;align-items:center;gap:12px}
.coach-input{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:12px 14px calc(96px + var(--safe-bot));
  background:linear-gradient(to top,var(--bg) 60%,transparent)}
.coach-bar{display:flex;align-items:flex-end;gap:9px;background:var(--glass);border:1px solid var(--hair);border-radius:24px;padding:7px 7px 7px 16px;backdrop-filter:blur(20px)}
.coach-bar textarea{flex:1;background:none;border:none;color:var(--txt);font-family:inherit;font-size:15px;resize:none;max-height:96px;padding:8px 0;outline:none}
.send{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;background:linear-gradient(120deg,var(--teal),var(--teal-2));transition:transform .12s,opacity .2s}
.send:active{transform:scale(.9)} .send svg{width:19px;height:19px;fill:#022}
.send:disabled{opacity:.4}
.typing{display:inline-flex;gap:4px;padding:14px 16px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.qreply{display:flex;gap:8px;overflow-x:auto;padding:0 2px 10px;margin:-4px 0 4px}
.qreply::-webkit-scrollbar{display:none}
.qreply .chip{white-space:nowrap;flex:none}
/* inputs */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:650;color:var(--muted);margin:0 0 8px 2px;letter-spacing:.02em}
.inp{width:100%;background:var(--glass);border:1px solid var(--hair);border-radius:15px;padding:15px 16px;color:var(--txt);font-size:16px;font-family:inherit;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--hair-2)}
.opts{display:grid;gap:9px}
.opt{padding:15px 16px;border-radius:15px;background:var(--glass);border:1px solid var(--hair);font-weight:600;font-size:15px;transition:.15s;text-align:left}
.opt.sel{border-color:var(--teal);background:rgba(39,224,168,.1);color:var(--teal-2)}
/* segmented */
.seg{display:flex;background:var(--glass);border:1px solid var(--hair);border-radius:14px;padding:4px;gap:4px}
.seg button{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:680;color:var(--muted);transition:.18s}
.seg button.on{background:var(--glass-2);color:var(--txt);box-shadow:0 1px 0 rgba(255,255,255,.06) inset}
/* medal */
.medal{aspect-ratio:1;display:grid;place-items:center;border-radius:20px;background:var(--glass);border:1px solid var(--hair);position:relative;overflow:hidden;padding:12px}
.medal.locked{filter:grayscale(1) brightness(.5);opacity:.7}
.medal svg{width:100%;height:auto}
.medal .mname{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;font-weight:700;color:var(--muted)}
/* feed */
.feed-card{padding:14px;margin-bottom:14px}
.feed-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.feed-av{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:800;font-size:14px}
.stat3{display:flex;gap:0;border:1px solid var(--hair);border-radius:14px;overflow:hidden}
.stat3 > div{flex:1;padding:11px 8px;text-align:center;border-right:1px solid var(--hair)}
.stat3 > div:last-child{border:none}
.toast{position:absolute;left:50%;bottom:140px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:rgba(20,22,26,.96);border:1px solid var(--hair-2);border-radius:14px;padding:12px 18px;font-size:13.5px;font-weight:600;
  opacity:0;transition:.3s var(--ease);backdrop-filter:blur(18px);box-shadow:var(--shadow);max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modlink{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:18px;background:var(--glass);border:1px solid var(--hair);margin-bottom:11px}
.modlink .mi{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center}
.modlink svg{width:21px;height:21px}
.chev{margin-left:auto;color:var(--muted-2)}
hr.hair{border:none;border-top:1px solid var(--hair);margin:16px 0}
.kv{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;border-bottom:1px solid var(--hair)}
.kv:last-child{border:none}
.kv b{font-weight:700}
::placeholder{color:var(--muted-2)}
.hidden{display:none!important}
.timerBig{font-size:64px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
/* ===== exercise learning system ===== */
.player{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:16/9;background:#05060a;border:1px solid var(--hair)}
.player video,.player iframe{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;border:0;z-index:1}
.player iframe{object-fit:fill}
.player-poster{position:absolute;inset:0;display:grid;place-items:center;cursor:pointer;z-index:2}
.bigplay{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.94);display:grid;place-items:center;box-shadow:var(--shadow);z-index:3;position:relative;transition:transform .15s}
.bigplay:active{transform:scale(.92)}
.bigplay svg{width:25px;height:25px;fill:#07080A;margin-left:3px}
.player-badge{position:absolute;top:10px;left:10px;z-index:5}
.player-src{position:absolute;top:10px;right:10px;z-index:5}
.ctrlbar{position:absolute;left:0;right:0;bottom:0;z-index:4;display:flex;align-items:center;gap:9px;padding:9px 11px;
  background:linear-gradient(to top,rgba(0,0,0,.88),rgba(0,0,0,.1) 80%,transparent);opacity:0;transition:opacity .25s}
.player.playing .ctrlbar{opacity:1}
.ctrlbar button{display:grid;place-items:center;color:#fff;flex:none}
.ctrlbar svg{width:19px;height:19px;fill:#fff}
.scrub{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:rgba(255,255,255,.28);outline:none}
.scrub::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--teal)}
.scrub::-moz-range-thumb{width:13px;height:13px;border:none;border-radius:50%;background:var(--teal)}
.ctrl-time{font-size:10.5px;color:#fff;font-variant-numeric:tabular-nums;min-width:72px;text-align:center;opacity:.9}
.ctrl-speed{font-size:11px;font-weight:800;color:#fff;padding:3px 6px;border:1px solid rgba(255,255,255,.4);border-radius:7px}
.angle-tabs{display:flex;gap:7px;margin:12px 0 0;overflow-x:auto;padding-bottom:2px}
.angle-tabs::-webkit-scrollbar{display:none}
.angle{flex:none;padding:8px 14px;border-radius:12px;font-size:12.5px;font-weight:680;background:var(--glass);border:1px solid var(--hair);color:var(--muted)}
.angle.on{background:var(--glass-2);color:var(--txt);border-color:var(--hair-2)}
.diff-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:780;padding:5px 11px;border-radius:999px;letter-spacing:.03em}
.diff-Beginner{color:var(--teal);background:rgba(39,224,168,.14)}
.diff-Intermediate{color:var(--amber);background:rgba(255,194,75,.14)}
.diff-Advanced{color:var(--red);background:rgba(255,77,94,.14)}
.musclemap{display:grid;place-items:center}
.musclemap svg{width:100%;max-width:320px;height:auto}
.stepcards{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:2px 18px 4px;margin:0 -18px}
.stepcards::-webkit-scrollbar{display:none}
.stepcard{flex:none;width:75%;scroll-snap-align:center;border-radius:18px;padding:18px;background:var(--glass);border:1px solid var(--hair);min-height:148px;backdrop-filter:blur(20px)}
.stepcard .sn{font-size:40px;font-weight:850;color:var(--teal);opacity:.28;line-height:1}
.dots{display:flex;gap:6px;justify-content:center;margin-top:11px}
.dots i{width:6px;height:6px;border-radius:50%;background:var(--hair-2);transition:.25s var(--ease)}
.dots i.on{background:var(--teal);width:18px;border-radius:99px}
.mistake-card{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-radius:14px;background:rgba(255,77,94,.06);border:1px solid rgba(255,77,94,.2);margin-bottom:9px}
.mistake-card .x{flex:none;font-size:13px}
.coach-tip{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-radius:14px;background:rgba(39,224,168,.06);border:1px solid rgba(39,224,168,.18);margin-bottom:9px}
.coach-tip span:first-child{color:var(--teal);font-weight:800;flex:none}
.weightcols{display:flex;border:1px solid var(--hair);border-radius:14px;overflow:hidden}
.weightcols > div{flex:1;text-align:center;padding:13px 6px;border-right:1px solid var(--hair)}
.weightcols > div:last-child{border:none}
.weightcols .wc.on{background:rgba(255,90,54,.1)}
.ramp{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ramp span{font-size:12px;font-weight:700;padding:6px 10px;border-radius:10px;background:var(--glass-2);border:1px solid var(--hair);font-variant-numeric:tabular-nums}
.fc-score{font-size:62px;font-weight:850;letter-spacing:-.03em;line-height:1.05;margin:2px 0}
.metric{margin-bottom:13px}
.metric .bar{margin-top:6px}
/* workout mode */
#workout{position:absolute;inset:0;z-index:70;background:
  radial-gradient(120% 60% at 80% -10%,rgba(255,90,54,.08),transparent 55%),
  radial-gradient(120% 50% at 0% 5%,rgba(39,224,168,.08),transparent 55%),var(--bg);
  display:flex;flex-direction:column;transform:translateY(100%);transition:transform .42s var(--ease);overflow:hidden;visibility:hidden}
#workout.open{transform:none;visibility:visible}
.wm-top{padding:calc(var(--safe-top) + 12px) 18px 12px;display:flex;align-items:center;gap:12px;flex:none}
.wm-body{flex:1;overflow-y:auto;padding:0 18px calc(24px + var(--safe-bot))}
.wm-body::-webkit-scrollbar{display:none}
.wm-stepper{display:flex;align-items:center;gap:16px;justify-content:center}
.wm-stepper button{width:50px;height:50px;border-radius:50%;background:var(--glass);border:1px solid var(--hair);font-size:26px;font-weight:600;display:grid;place-items:center;line-height:1}
.wm-stepper button:active{transform:scale(.92)}
.wm-val{font-size:44px;font-weight:850;font-variant-numeric:tabular-nums;min-width:110px;text-align:center}
.wm-rest{position:absolute;inset:0;z-index:8;background:rgba(7,8,10,.97);backdrop-filter:blur(14px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s}
.wm-rest.open{opacity:1;pointer-events:auto}
code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:var(--glass-2);padding:1px 5px;border-radius:5px}
.wgerdesc p{margin:6px 0}.wgerdesc ul,.wgerdesc ol{padding-left:18px;margin:6px 0}.wgerdesc li{margin:3px 0}
</style>
</head>
<body>
<div id="app">

  <!-- ONBOARDING -->
  <div id="onboard" class="screen active" style="padding-bottom:24px"></div>

  <!-- HOME -->
  <div id="home" class="screen"></div>
  <!-- TRAIN -->
  <div id="train" class="screen"></div>
  <!-- COACH -->
  <div id="coach" class="screen">
    <div class="coach-head">
      <div class="avatar" style="width:42px;height:42px;font-size:15px;background:linear-gradient(135deg,var(--teal),var(--blue))">CF</div>
      <div>
        <div style="font-weight:780;font-size:16px">Coach Felix</div>
        <div style="font-size:12px;color:var(--teal)">● Certified Hybrid Coach · online</div>
      </div>

/* ============================ WGER LIVE DATA ============================ */
/* Vanilla port of the wger integration layer. Reads the public, no-auth
   endpoints (exercises, muscles, categories, equipment) straight from the
   browser. If your host blocks the cross-site request (CORS), set WGER.proxy
   to your DirectAdmin proxy, e.g.  WGER.proxy = "wger-proxy.php?url=";        */
const WGER = {
  base: "https://wger.de/api/v2",
  proxy: "",          // e.g. "wger-proxy.php?url="  (leave "" to call wger.de directly)
  lang: 2,            // 2 = English
  _cache: {},
  _byId: {},
  url(path, params){
    const qs = params ? "?" + new URLSearchParams(params).toString() : "";
    const full = this.base + path + qs;
    return this.proxy ? this.proxy + encodeURIComponent(full) : full;
  },
  async get(path, params){
    const key = path + JSON.stringify(params || {});
    if(this._cache[key]) return this._cache[key];
    const r = await fetch(this.url(path, params), { headers:{ Accept:"application/json" } });
    if(!r.ok) throw new Error("wger " + r.status);
    const j = await r.json();
    this._cache[key] = j; return j;
  },
  exercises(params={}){ return this.get("/exerciseinfo/", { language:this.lang, limit:24, ...params }); },
  exercise(id){ return this.get(`/exerciseinfo/${id}/`); },
  categories(){ return this.get("/exercisecategory/", { limit:50 }); },
  /* presentation helpers */
  name(ex){ const t=(ex.translations||[]).find(t=>t.language===this.lang)||(ex.translations||[]).find(t=>t.language===2)||(ex.translations||[])[0]; return t?t.name:("Exercise #"+ex.id); },
  desc(ex){ const t=(ex.translations||[]).find(t=>t.language===this.lang)||(ex.translations||[])[0]; return t?(t.description||""):""; },
  img(ex){ const i=(ex.images||[]).find(i=>i.is_main)||(ex.images||[])[0]; return i?i.image:null; },
  vid(ex){ const v=(ex.videos||[]).find(v=>v.is_main)||(ex.videos||[])[0]; return v?v.video:null; },
};

/* ---- SVG ring / gauge / charts ---- */
function ring(pct,color,size=120,sw=11,label){
  const r=(size-sw)/2,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="${sw}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
        stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}"
        style="transition:stroke-dashoffset 1s var(--ease)" data-dash="${off}"/>
    </svg>${label?`<div class="ring-center">${label}</div>`:""}</div>`;
}
function gauge(pct,size=170){ // WHOOP semicircle
  const sw=14,r=(size-sw)/2,c=Math.PI*r,off=c*(1-pct/100),col=zoneColor(pct);
  return `<div class="ring-wrap" style="width:${size}px;height:${size/2+12}px;overflow:visible">
    <svg width="${size}" height="${size/2+12}" viewBox="0 0 ${size} ${size/2+12}">
      <path d="M${sw/2} ${size/2} A${r} ${r} 0 0 1 ${size-sw/2} ${size/2}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="${sw}" stroke-linecap="round"/>
      <path d="M${sw/2} ${size/2} A${r} ${r} 0 0 1 ${size-sw/2} ${size/2}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${c}" style="transition:stroke-dashoffset 1.1s var(--ease)" data-dash="${off}"/>
    </svg>
    <div class="ring-center" style="top:34%">
      <div class="num" style="font-size:38px;font-weight:850;color:${col}">${pct}%</div>
      <div class="eyebrow" style="margin-top:2px">Recovery</div></div></div>`;
}
function lineChart(data,color,{w=300,h=110,fill=true,inv=false,lab}={}){
  const min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1,pad=8;
  const X=i=>pad+i*(w-2*pad)/(data.length-1);
  const Y=v=>{let t=(v-min)/rng;if(inv)t=1-t;return h-pad-t*(h-2*pad);};
  let d="",a="";data.forEach((v,i)=>{const x=X(i),y=Y(inv?v:v);d+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";});
  a=`M${pad} ${h-pad} `+data.map((v,i)=>`L${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(" ")+` L${w-pad} ${h-pad} Z`;
  const last=data[data.length-1];
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="none" style="display:block">
    <defs><linearGradient id="g${color.replace(/[^a-z]/gi,'')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    ${fill?`<path d="${a}" fill="url(#g${color.replace(/[^a-z]/gi,'')})"/>`:""}
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${X(data.length-1)}" cy="${Y(last)}" r="3.6" fill="${color}"/></svg>`;
}
function barChart(data,color,{w=300,h=110,target}={}){
  const max=Math.max(...data,target||0)*1.1,pad=8,gap=6,bw=(w-2*pad-gap*(data.length-1))/data.length;
  let bars=data.map((v,i)=>{const bh=(v/max)*(h-2*pad),x=pad+i*(bw+gap),y=h-pad-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${i===data.length-1?color:'rgba(255,255,255,.16)'}"/>`;}).join("");
  let tl=target?`<line x1="${pad}" x2="${w-pad}" y1="${(h-pad-(target/max)*(h-2*pad)).toFixed(1)}" y2="${(h-pad-(target/max)*(h-2*pad)).toFixed(1)}" stroke="${color}" stroke-width="1.4" stroke-dasharray="4 4" opacity=".6"/>`:"";
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">${bars}${tl}</svg>`;
}
function animateRings(scope){(scope||document).querySelectorAll('circle[data-dash],path[data-dash]').forEach(c=>{
  requestAnimationFrame(()=>requestAnimationFrame(()=>{c.style.strokeDashoffset=c.dataset.dash;}));});}

function fmtTime(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function startTimer(){timer.t=timer.dur;if(!timer.run)toggleTimer();else{updTimer();}}
function toggleTimer(){
  const b=$("#timerToggle");if(!b)return;
  if(timer.run){timer.run=false;clearInterval(timer.iv);b.textContent="Resume";b.className="btn teal";}
  else{timer.run=true;b.textContent="Pause";b.className="btn ghost";
    timer.iv=setInterval(()=>{timer.t--;updTimer();if(timer.t<=0){clearInterval(timer.iv);timer.run=false;beep();
      const bb=$("#timerToggle");if(bb){bb.textContent="Start";bb.className="btn teal";}timer.t=timer.dur;updTimer();toast("Rest done — next set 💥");}},1000);}
}
function updTimer(){const d=$("#timerDisp");if(d){d.textContent=fmtTime(Math.max(0,timer.t));
  d.style.color=timer.t<=5?"var(--ember)":"var(--blue)";}}
function addTime(s){timer.t+=s;updTimer();}
function resetTimer(){timer.t=timer.dur;timer.run=false;clearInterval(timer.iv);const b=$("#timerToggle");if(b){b.textContent="Start";b.className="btn teal";}updTimer();}
function beep(){try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.frequency.value=880;o.type="sine";g.gain.setValueAtTime(.0001,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.3,a.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+.4);
  o.start();o.stop(a.currentTime+.4);}catch(e){}}

        ${medalSVG(a.tier)}<div class="mname">${a.name}</div></div>`;}).join('')}</div>
    <div class="card pad mt" style="background:linear-gradient(135deg,rgba(245,196,81,.1),transparent)">
      <div class="eyebrow" style="color:var(--gold)">Next up</div>
      <div style="font-weight:700;margin-top:4px">Marathon Finisher</div>
      <div class="bar mt-s"><i style="width:62%;background:var(--gold)"></i></div>
      <div class="h-sub mt-s" style="font-size:12px">62% through your training block — ${daysTo(S.marathonDate)} days to earn it.</div></div>`;
  },
  social(){
    const feed=[
      {n:"Maria Santos",c:"var(--ember)",a:"MS",act:"Long Run",stats:[["21.1","km"],["2:01","time"],["5:44","/km"]],msg:"Half marathon PR! 🔥 That sub-5:45 felt smooth.",t:"2h"},
      {n:"Coach Felix",c:"var(--teal)",a:"CF",act:"Tip",msg:"Reminder team: protein within 2h of lifting. Felix, you're crushing the recomp — keep it up. 💪",t:"5h"},
      {n:"Jay Reyes",c:"var(--blue)",a:"JR",act:"Push Day",stats:[["8","exercises"],["58","min"],["+5kg","bench PR"]],msg:"New bench PR at 82.5kg!",t:"1d"},
    ];
    return `<div class="eyebrow">Like Strava — share & connect</div><h1 style="margin:6px 0 16px">Feed</h1>
    <div class="grid g2 mb">
      <button class="btn teal" onclick="toast('Workout shared to feed 🎉')">Share workout</button>
      <button class="btn ghost" onclick="toast('Medal shared 🏅')">Share medal</button></div>
    ${feed.map(p=>`<div class="card feed-card">
      <div class="feed-top"><div class="feed-av" style="background:${p.c};color:#07080A">${p.a}</div>
        <div style="flex:1"><div style="font-weight:700;font-size:14px">${p.n}</div><div class="h-sub" style="font-size:11.5px">${p.act} · ${p.t} ago</div></div>
        <span class="pill teal">${p.act}</span></div>
      <div style="font-size:14px;line-height:1.45;margin-bottom:${p.stats?'11px':'0'}">${p.msg}</div>
      ${p.stats?`<div class="stat3">${p.stats.map(s=>`<div><div class="num" style="font-weight:800;font-size:16px">${s[0]}</div><div class="h-sub" style="font-size:10.5px">${s[1]}</div></div>`).join('')}</div>`:''}
      <div class="row mt-s" style="gap:18px;color:var(--muted);font-size:13px"><span onclick="toast('Kudos given 👏')">👏 Kudos</span><span>💬 Comment</span></div>
    </div>`).join('')}`;
  },
  integrations(){
    const list=[["garmin","Garmin Connect","⌚","Runs · HR · VO₂ Max · sleep","var(--blue)"],
      ["strava","Strava","🟠","Runs · rides · segments · kudos","var(--ember)"],
      ["apple","Apple Health","🍎","Steps · workouts · HR · calories","var(--teal)"],
      ["google","Google Fit","🟢","Steps · activity · heart points","var(--green)"]];
    return `<div class="eyebrow">Auto-sync your training</div><h1 style="margin:6px 0 16px">Integrations</h1>
    ${list.map(([k,t,ic,d,col])=>`<div class="modlink">
      <div class="mi" style="font-size:20px;background:rgba(255,255,255,.06)">${ic}</div>
      <div style="flex:1"><div style="font-weight:700">${t}</div><div class="h-sub" style="font-size:12px">${d}</div></div>
      <button class="chip ${S.integrations[k]?'on':''}" onclick="S.integrations['${k}']=!S.integrations['${k}'];openSub('integrations');toast('${t} ${S.integrations[k]?'disconnected':'connected'}')">${S.integrations[k]?'Connected':'Connect'}</button>
    </div>`).join('')}
    <div class="card pad mt"><div class="eyebrow">Auto-syncing</div>
      <div class="row mt-s" style="gap:8px;flex-wrap:wrap">
        ${["Runs","Cycling","Steps","Heart Rate","Calories"].map(x=>`<span class="chip on">${x}</span>`).join('')}</div></div>`;
  },
};
let curPlan="intermediate";
function selectPlan(p,btn){curPlan=p;$("#planSeg").querySelectorAll('button').forEach(b=>b.classList.remove('on'));btn.classList.add('on');$("#planBody").innerHTML=planBody(p);}
function planBody(p){const m=MARATHON[p];
  return `<div class="card pad mb"><div class="between"><h2 style="font-size:18px">${m.name} Plan</h2><span class="pill blue">${m.weeks} weeks</span></div>
    <div class="h-sub mt-s" style="font-size:13px">${m.days} days/week · peaks at ${m.peak} km · goal: ${m.goal}</div>

    ${barChart(m.long,"var(--blue)",{h:90})}

    <div class="card pad"><div class="eyebrow">Tempo Run</div><div style="font-weight:700;margin-top:4px">6–10 km</div><div class="h-sub" style="font-size:12px">Threshold pace</div></div>

/* ============================ COACH FELIX (Anthropic API) ============================ */
let coachHistory=[];
function coachSystem(){const u=S.user;
  return `You are Coach Felix, a certified personal trainer and hybrid-athlete coach (strength + endurance). You coach inside the Hybrid Coach AI app. Be warm, motivating, sharp, and practical — like a real elite coach texting a client. Keep replies concise (2-5 short paragraphs or tight bullet lists), use the athlete's real numbers, and never give a wall of text.

ATHLETE PROFILE:
- Name: ${u.name}, ${u.age}M, ${Math.floor(u.heightCm/2.54/12)}'${Math.round(u.heightCm/2.54%12)}" (${u.heightCm}cm), ${u.weightKg}kg
- Goal: build muscle while becoming a faster runner (body recomposition + marathon)
- Training: 5-day hybrid split (Push/Pull/Run/Legs/Full-body+Core) + marathon block. 10K runner, also cycles. Trains at Anytime Fitness, no human PT.
- Marathon goal: ${u.marathonGoal}, race in ${daysTo(S.marathonDate)} days
- Current: recovery ${S.recovery}%, ${S.streak}-day streak, weekly load ${S.load.current}/${S.load.target}, VO2 ${S.run.vo2}, resting HR ${S.run.restHr}, bench ${S.benchSeries.at(-1)}kg, weight trending ${S.weightSeries[0]}→${S.weightSeries.at(-1)}kg
- Nutrition target: ~${S.cals.target} kcal, ${S.protein.target}g protein. Prefers Filipino-friendly foods (eggs, chicken, tuna, tilapia, brown rice, oats, greek yogurt, banana, sweet potato).

WHAT YOU DO: analyze progress, recommend specific weights/sets/reps, adjust workouts around recovery & running load, recommend recovery, suggest nutrition (Filipino-friendly, hit protein), help prevent injuries, and answer fitness questions.

RULES: Give concrete numbers (e.g. "go 77.5kg x 6"). Balance lifting fatigue against run quality. Flag injury risk. If asked something medical/serious, recommend a professional. Currency is PHP (₱) if money comes up. Stay encouraging but honest.`;
}
function initCoach(){
  coachHistory=[];
  const scroll=$("#coachScroll");scroll.innerHTML='<div style="display:flex;flex-direction:column"></div>';
  addCoachMsg(`Yo ${S.user.name.split(" ")[0]} 👊 Coach Felix here. Recovery's at ${S.recovery}% today and you're on a ${S.streak}-day streak — momentum's real.\n\nWhat do you want to work on? I can adjust today's session, recommend weights, plan your runs around the marathon, or sort your nutrition.`,"coach",false);
}
function resetCoach(){initCoach();renderQreply();toast("New chat started");}
function renderQreply(){
  const qs=["What weight should I bench today?","Adjust my plan — legs feel beat","Am I on track for my marathon?","Best Filipino high-protein lunch?","My knee hurts when running"];
  $("#qreply").innerHTML=qs.map(q=>`<span class="chip" onclick="askCoachAbout(this.textContent)">${q}</span>`).join('');
}
function addCoachMsg(text,who,store=true){
  const wrap=$("#coachScroll").firstChild;
  const m=el("div","msg "+(who==="me"?"me":"coach"),text);
  wrap.appendChild(m);scrollCoach();
  if(store)coachHistory.push({role:who==="me"?"user":"assistant",content:text});
}
function scrollCoach(){const s=$("#coachScroll");requestAnimationFrame(()=>s.scrollTop=s.scrollHeight);}
function askCoachAbout(q){go('coach');$("#coachInput").value=q;sendCoach();}
async function sendCoach(){
  const inp=$("#coachInput"),text=inp.value.trim();if(!text)return;
  inp.value="";inp.style.height="auto";
  addCoachMsg(text,"me");
  const wrap=$("#coachScroll").firstChild;
  const typing=el("div","msg coach typing",'<i></i><i></i><i></i>');wrap.appendChild(typing);scrollCoach();
  $("#sendBtn").disabled=true;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        system:coachSystem(),
        messages:coachHistory.slice(-12)})
    });
    const data=await res.json();
    typing.remove();
    let reply="";
    if(data && data.content){reply=data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();}
    if(!reply)reply="I'm here — try asking that again in a sec.";
    addCoachMsg(reply,"coach");
  }catch(e){
    typing.remove();
    addCoachMsg("I can't reach the network right now, but here's the principle: train hard when recovery is green, ease off when it's red, and never skip protein. Try me again in a moment. 💪","coach");
  }finally{$("#sendBtn").disabled=false;}
}
$("#coachInput").addEventListener("input",e=>{e.target.style.height="auto";e.target.style.height=Math.min(96,e.target.scrollHeight)+"px";});
$("#coachInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendCoach();}});

renderOnboard();
$("#nav").style.display="none";

/* PWA: attempt to register an inline service worker for offline (best-effort) */
if("serviceWorker" in navigator){
  try{
    const sw=`self.addEventListener("install",e=>self.skipWaiting());
    self.addEventListener("activate",e=>self.clients.claim());
    self.addEventListener("fetch",e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)))});`;
    const blob=new Blob([sw],{type:"text/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }catch(e){}
}
