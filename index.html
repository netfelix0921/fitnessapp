// ---- Step navigation ----
function showStep(idx, dir='enter') {
  const steps = document.querySelectorAll('.ob-slide');
  steps.forEach((s, i) => {
    s.classList.remove('ob-active','ob-exit');
    if(i === idx) s.classList.add('ob-active');
  });

  const step = OB_STEPS[idx];
  const backBtn = $('#ob-back');
  const skipBtn = $('#ob-skip');
  const footer = $('.ob-footer');
  const nextBtn = $('#ob-next');

  // Back button
  if(backBtn) backBtn.style.display = (step.back && idx > 0) ? 'grid' : 'none';
  // Skip button
  if(skipBtn) skipBtn.style.display = step.skip ? 'block' : 'none';

  // Progress
  const pct = idx === 0 ? 0 : Math.round(((idx) / (OB_STEPS.length - 1)) * 100);
  const bar = $('#ob-progress-bar');
  if(bar) bar.style.width = pct + '%';

  // Button text
  if(nextBtn) {
    if(idx === 0) nextBtn.innerHTML = `Let's begin <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    else if(idx === OB_STEPS.length - 1) nextBtn.innerHTML = `Build my plan <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 7v6c0 5 3.5 7.5 8 9 4.5-1.5 8-4 8-9V7l-8-5z" stroke="#fff" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
    else nextBtn.innerHTML = `Continue <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  haptic();
  ob.step = idx;

  // Scroll to top
  const activeSlide = document.getElementById('ob-slide-' + idx);
  if(activeSlide) activeSlide.scrollTop = 0;
}

function obNext() {
  if(!validateStep(ob.step)) return;
  collectStep(ob.step);

  if(ob.step >= OB_STEPS.length - 1) {
    finishOnboarding();
    return;
  }
  // Animate current out
  const curr = document.getElementById('ob-slide-' + ob.step);
  if(curr) {
    curr.classList.remove('ob-active');
    curr.classList.add('ob-exit');
    setTimeout(() => { if(curr) curr.classList.remove('ob-exit'); }, 420);
  }

  showStep(ob.step + 1, 'enter');
}

function obBack() {
  if(ob.step <= 0) return;
  collectStep(ob.step);
  const curr = document.getElementById('ob-slide-' + ob.step);
  if(curr) {
    curr.classList.remove('ob-active');
    // For back, exit to the right
    curr.style.transform = 'translateX(32px)';
    curr.style.opacity = '0';
    setTimeout(() => {
      if(curr) { curr.style.transform = ''; curr.style.opacity = ''; }
    }, 420);
  }
  showStep(ob.step - 1, 'back');
  haptic();
}

function obSkip() {
  collectStep(ob.step);
  const curr = document.getElementById('ob-slide-' + ob.step);
  if(curr) {
    curr.classList.remove('ob-active');
    curr.classList.add('ob-exit');
    setTimeout(() => { if(curr) curr.classList.remove('ob-exit'); }, 420);
  }
  if(ob.step >= OB_STEPS.length - 1) { finishOnboarding(); return; }
  showStep(ob.step + 1, 'enter');
  haptic();
}

// ---- Collect current step data ----
function collectStep(idx) {
  const id = OB_STEPS[idx].id;
  if(id === 'personal') {
    ob.data.firstName = ($('#ob-fname') ? $('#ob-fname').value.trim() : ob.data.firstName);
    ob.data.age = ($('#ob-age') ? $('#ob-age').value : ob.data.age);
    ob.data.sex = ($('#ob-sex') ? $('#ob-sex').value : ob.data.sex);
  }
  if(id === 'measurements') {
    ob.data.weight = ($('#ob-weight') ? $('#ob-weight').value : ob.data.weight);
    ob.data.targetWeight = ($('#ob-target') ? $('#ob-target').value : ob.data.targetWeight);
    ob.data.height = ($('#ob-height') ? $('#ob-height').value : ob.data.height);
    // Normalise to metric
    const w = parseFloat(ob.data.weight);
    const tw = parseFloat(ob.data.targetWeight);
    const h = parseFloat(ob.data.height);
    ob.data.weightKg = ob.weightUnit === 'lbs' ? (w * 0.453592).toFixed(1) : (w||0).toFixed(1);
    ob.data.targetWeightKg = ob.weightUnit === 'lbs' ? (tw * 0.453592).toFixed(1) : (tw||0).toFixed(1);
    ob.data.heightCm = ob.heightUnit === 'ft' ? (h * 30.48).toFixed(0) : (h||0);
  }
}

// ---- Validate step before advancing ----
function validateStep(idx) {
  const id = OB_STEPS[idx].id;
  if(id === 'intro') return true;
  if(id === 'personal') {
    const name = $('#ob-fname') ? $('#ob-fname').value.trim() : ob.data.firstName;
    if(!name) { pulseField('ob-fname'); return false; }
    return true;
  }
  if(id === 'goal') {
    if(!ob.data.goal) { pulseFields(); return false; }
    return true;
  }
  if(id === 'level') {
    if(!ob.data.level) { pulseFields(); return false; }
    return true;
  }
  if(id === 'activities') {
    if(!ob.data.activities || !ob.data.activities.length) { pulseFields(); return false; }
    return true;
  }
  return true;
}

function pulseField(id) {
  const el = $('#' + id); if(!el) return;
  el.style.borderColor = 'var(--error)';
  el.style.boxShadow = '0 0 0 3px rgba(239,68,68,.2)';
  el.focus();
  setTimeout(() => { el.style.borderColor=''; el.style.boxShadow=''; }, 1800);
}
function pulseFields() {
  const slide = document.getElementById('ob-slide-' + ob.step);
  if(!slide) return;
  slide.style.animation = 'obShake .4s ease';
  setTimeout(() => { slide.style.animation = ''; }, 400);
}

// ---- Interaction handlers ----
function selectGoal(id, el) {
  haptic();
  ob.data.goal = id;
  document.querySelectorAll('.ob-goal-card').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
}

function toggleActivity(id, el) {
  haptic();
  if(!ob.data.activities) ob.data.activities = [];
  const idx = ob.data.activities.indexOf(id);
  if(idx === -1) ob.data.activities.push(id);
  else ob.data.activities.splice(idx, 1);
  el.classList.toggle('on', ob.data.activities.includes(id));
}

function selectLevel(id, el) {
  haptic();
  ob.data.level = id;
  document.querySelectorAll('.ob-level').forEach(l => l.classList.remove('on'));
  el.classList.add('on');
}

function toggleEquip(id, el) {
  haptic();
  if(!ob.data.equipment) ob.data.equipment = [];
  if(id === 'none') {
    ob.data.equipment = ['none'];
    document.querySelectorAll('.ob-equip').forEach(e => e.classList.remove('on'));
    el.classList.add('on');
    return;
  }
  const noneEl = document.querySelector('.ob-equip[onclick*="none"]');
  if(noneEl) noneEl.classList.remove('on');
  ob.data.equipment = ob.data.equipment.filter(e => e !== 'none');
  const idx = ob.data.equipment.indexOf(id);
  if(idx === -1) ob.data.equipment.push(id);
  else ob.data.equipment.splice(idx, 1);
  el.classList.toggle('on', ob.data.equipment.includes(id));
}

function selectFreq(n, el) {
  haptic();
  ob.data.frequency = n;
  document.querySelectorAll('.ob-freq-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function toggleIntegration(id, el) {
  haptic();
  if(!ob.data.integrations) ob.data.integrations = [];
  const idx = ob.data.integrations.indexOf(id);
  if(idx === -1) ob.data.integrations.push(id);
  else ob.data.integrations.splice(idx, 1);
  el.classList.toggle('on', ob.data.integrations.includes(id));

function setWeightUnit(u) {
  ob.weightUnit = u;
  document.querySelectorAll('#ob-weight-units button').forEach((b,i) => b.classList.toggle('on', (i===0&&u==='kg')||(i===1&&u==='lbs')));
  const wInp = $('#ob-weight'); if(wInp) wInp.placeholder = u==='kg'?'e.g. 75':'e.g. 165';
  const tInp = $('#ob-target'); if(tInp) tInp.placeholder = u==='kg'?'e.g. 68':'e.g. 150';
  const lbl1 = document.querySelector('#ob-slide-2 .ob-row .ob-field:first-child label');
  const lbl2 = document.querySelector('#ob-slide-2 .ob-row .ob-field:last-child label');
  if(lbl1) lbl1.textContent = u==='kg'?'Weight (kg)':'Weight (lbs)';
  if(lbl2) lbl2.textContent = u==='kg'?'Target weight (kg)':'Target weight (lbs)';
}

function setHeightUnit(u) {
  ob.heightUnit = u;
  document.querySelectorAll('#ob-height-units button').forEach((b,i) => b.classList.toggle('on', (i===0&&u==='cm')||(i===1&&u==='ft')));
  const hInp = $('#ob-height'); if(hInp) { hInp.placeholder = u==='cm'?'e.g. 175':"e.g. 5.11"; }
  const lbl = document.querySelector('#ob-slide-2 .ob-field:last-child label');
  if(lbl) lbl.textContent = u==='cm'?'Height (cm)':'Height (ft decimal)';
}

// ---- Finish / Generate ----
async function finishOnboarding() {
  collectStep(ob.step);

  // Set defaults for skipped steps
  if(!ob.data.frequency) ob.data.frequency = 4;
  if(!ob.data.equipment) ob.data.equipment = [];
  if(!ob.data.integrations) ob.data.integrations = [];
  if(!ob.data.activities || !ob.data.activities.length) ob.data.activities = ['running', 'gym'];

  // Apply to state
  applyOnboardingToState(ob.data);

  // Show generating screen
  $('#onboarding').style.display = 'none';
  const genEl = $('#ob-generating');
  genEl.style.display = 'flex';

  const steps = [
    'Analysing your fitness profile…',
    'Setting intensity and volume…',
    'Building your 7-day plan…',
    'Personalising exercise selection…',
    'Finalising recovery schedule…',
  ];

  const stepsEl = $('#ob-gen-steps');
  stepsEl.innerHTML = steps.map((s,i)=>`
    <div class="ob-gen-step" id="ob-gs-${i}">
      <div class="ob-gen-step-dot"></div>${s}
    </div>`).join('');

  // Animate steps
  let plan = null;
  const animateSteps = async () => {
    for(let i=0; i<steps.length; i++) {
      await new Promise(r=>setTimeout(r, i===0?300:700));
      const el = $('#ob-gs-'+i);
      if(el) el.classList.add('ob-step-active');
      const sub = $('#ob-gen-sub');
      if(sub) { sub.style.opacity='0'; setTimeout(()=>{ sub.textContent=steps[i]; sub.style.opacity='1'; },200); }
      if(i>0) {
        const prev = $('#ob-gs-'+(i-1));
        if(prev) { prev.classList.remove('ob-step-active'); prev.classList.add('ob-step-done'); }
      }
    }
    await new Promise(r=>setTimeout(r, 700));
    const last = $('#ob-gs-'+(steps.length-1));
    if(last) { last.classList.remove('ob-step-active'); last.classList.add('ob-step-done'); }
  };

  // Generate plan with AI concurrently
  const [, generatedPlan] = await Promise.all([
    animateSteps(),
    generatePlanWithAI(ob.data),
  ]);

  plan = generatedPlan;

  // Store onboarding data with plan
  ob.data.plan = plan;
  ob.data.completed = true;
  ob.data.completedAt = new Date().toISOString();
  saveOnboardingData(ob.data);

  // Apply generated plan to state
  if(plan && plan.weeklyPlan) {
    state.plan = plan.weeklyPlan;
  }
  if(plan && plan.todayFocus) {
    state.todayFocus = plan.todayFocus;
  }

  // Small delay then show welcome
  await new Promise(r=>setTimeout(r, 600));
  genEl.style.display = 'none';
  showWelcomeScreen(ob.data, plan);
}

// ---- AI Plan Generation ----
async function generatePlanWithAI(profile) {
  const prompt = `You are a professional fitness coach. Generate a personalised 7-day workout plan for this user.

Profile:
- Name: ${profile.firstName || 'the user'}
- Age: ${profile.age || 'unknown'}
- Sex: ${profile.sex || 'unknown'}
- Weight: ${profile.weightKg || '?'} kg, Target: ${profile.targetWeightKg || '?'} kg
- Height: ${profile.heightCm || '?'} cm
- Primary goal: ${profile.goal || 'stay_active'}
- Fitness level: ${profile.level || 'intermediate'}
- Preferred activities: ${(profile.activities||[]).join(', ')||'general fitness'}
- Equipment: ${(profile.equipment||[]).join(', ')||'bodyweight'}
- Workout days per week: ${profile.frequency || 4}

Respond with ONLY valid JSON (no markdown, no backticks) in this exact format:
{
  "weeklyPlan": [
    {"day":"Mon","name":"5km Easy Run","type":"Run","done":false,"today":false},
    {"day":"Tue","name":"Upper Body","type":"Upper Body","done":false,"today":false},
    {"day":"Wed","name":"Rest","type":"Recovery","done":false,"today":false},
    {"day":"Thu","name":"Cycling","type":"Cycling","done":false,"today":true},
    {"day":"Fri","name":"Lower Body","type":"Lower Body","done":false,"today":false},
    {"day":"Sat","name":"Long Run","type":"Long Run","done":false,"today":false},
    {"day":"Sun","name":"Active Recovery","type":"Recovery","done":false,"today":false}
  ],
  "todayFocus": {
    "title": "Lower Body Strength",
    "meta": ["~45 min","3-4 sets","Moderate weight"]
  },
  "coachNote": "One encouraging sentence about their plan (max 20 words)",
  "weeklyVolume": "e.g. 4 workouts · ~180 min",
  "planName": "e.g. Fat Loss Kickstart"
}

Use only these types for the weeklyPlan type field: Run, Cycling, Walking, Gym, Upper Body, Lower Body, Hike, Long Run, Recovery, Rest.
Distribute workout days correctly based on frequency: ${profile.frequency || 4} days active, rest on remaining days.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{ role:'user', content:prompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch(e) {
    // Fallback plan
    return {
      weeklyPlan:[
        {day:'Mon',name:'Easy Run',type:'Run',done:false,today:false},
        {day:'Tue',name:'Upper Body',type:'Upper Body',done:false,today:false},
        {day:'Wed',name:'Rest',type:'Recovery',done:false,today:false},
        {day:'Thu',name:'Lower Body',type:'Lower Body',done:false,today:true},
        {day:'Fri',name:'Cycling',type:'Cycling',done:false,today:false},
        {day:'Sat',name:'Long Run',type:'Long Run',done:false,today:false},
        {day:'Sun',name:'Active Recovery',type:'Recovery',done:false,today:false},
      ],
      todayFocus:{ title:'Lower Body Strength', meta:['~45 min','3–4 sets','Moderate weight'] },
      coachNote:`Ready to help you reach your goals, ${profile.firstName||'you'}. Let's build something great.`,
      weeklyVolume:'4 workouts · ~180 min',
      planName:'Your Starter Plan'
    };
  }
}

// ---- Welcome Screen ----
function showWelcomeScreen(profile, plan) {
  const ws = $('#ob-welcome-screen');
  ws.style.display = 'flex';
  ws.style.animation = 'obTitleIn .6s var(--ease) both';

  const nameEl = $('#ob-welcome-name');
  if(nameEl) nameEl.textContent = `Welcome, ${profile.firstName||'Athlete'}.`;

  const taglineEl = $('#ob-welcome-tagline');
  if(taglineEl) taglineEl.textContent = plan?.coachNote || 'Your personalised plan is ready. Let\'s get to work.';

  // Build plan preview
  const preview = $('#ob-plan-preview');
  if(preview && plan?.weeklyPlan) {
    const ACT_EMOJI = {Run:'🏃',Cycling:'🚴',Walking:'🚶','Upper Body':'💪','Lower Body':'🦵',Gym:'🏋️',Hike:'🥾','Long Run':'🏃',Recovery:'😴',Rest:'😴'};
    preview.innerHTML = `
      <div class="ob-plan-preview-title">${plan.planName || 'Your first week'}</div>
      <div class="ob-plan-days">
        ${plan.weeklyPlan.map(d => `
          <div class="ob-plan-day-item">
            <div class="ob-plan-day-label">${d.day[0]}</div>
            <div class="ob-plan-day-dot ${d.type==='Recovery'||d.type==='Rest'?'ob-rest':'ob-workout'}">${ACT_EMOJI[d.type]||'💪'}</div>
          </div>`).join('')}
      </div>
    `;
  }
}

function enterApp() {
  haptic();
  const ws = $('#ob-welcome-screen');
  if(ws) { ws.style.opacity='0'; ws.style.transition='opacity .4s'; setTimeout(()=>ws.style.display='none',400); }

  // Init app
  renderHome();
  const tab=new URLSearchParams(location.search).get('tab');
  if(tab && ['home','activities','coach','profile'].includes(tab)) setTimeout(()=>go(tab),300);
  setTimeout(()=>{ $('#splash').classList.add('hide'); },100);
}

// ---- Reset (for dev/testing — accessible from profile) ----
function resetOnboarding() {
  clearOnboarding();
  location.reload();
}
</script>
